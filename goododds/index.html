  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{background:#0d0d0d;font-family:'IBM Plex Sans',sans-serif}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#222}
  ::-webkit-scrollbar-thumb{background:#5a5a5a;border-radius:2px}
  @keyframes modflash{
    0%  {opacity:0.4;outline:2px solid #fbbf24}
    40% {opacity:0.8;outline:2px solid #fbbf2488}
    100%{opacity:1;outline:2px solid transparent}
  }
  .mod-flash{animation:modflash 700ms ease-out;will-change:opacity}
  @keyframes readypulse{0%,100%{opacity:1}50%{opacity:.5}}
  .res-ready{animation:readypulse 2.2s ease-in-out infinite;will-change:opacity}
  @keyframes floatnum{
    0%  {opacity:1;transform:translateY(0)}
    20% {opacity:1;transform:translateY(-35px)}
    38% {opacity:1;transform:translateY(-46px)}
    55% {opacity:1;transform:translateY(-37px)}
    70% {opacity:1;transform:translateY(-15px)}
    82% {opacity:0.7;transform:translateY(10px)}
    100%{opacity:0;transform:translateY(72px)}
  }
  .float-num{position:absolute;pointer-events:none;z-index:100;font-family:'IBM Plex Mono',monospace;font-weight:bold;font-size:26px;user-select:none;white-space:nowrap;will-change:transform,opacity;text-shadow:0 0 3px #000,0 1px 3px #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000}
  .float-num-arcC,.float-num-arcL,.float-num-arcR{animation:floatnum 3.2s linear forwards}
  .float-num-crit{font-size:38px!important}
  @keyframes critshake{
    0%,100%{transform:translateX(0) scale(1)}
    15%    {transform:translateX(-5px) scale(1.12) rotate(-2deg)}
    35%    {transform:translateX(5px) scale(1.16) rotate(2deg)}
    55%    {transform:translateX(-3px) scale(1.08) rotate(-1deg)}
    75%    {transform:translateX(3px) scale(1.04)}
  }
  .crit-shake{display:inline-block;animation:critshake 450ms ease-out;will-change:transform}
  @keyframes forgesuccess{
    0%  {opacity:0.5;outline:2px solid #4ade80}
    50% {opacity:1;outline:2px solid #4ade8088}
    100%{opacity:1;outline:2px solid transparent}
  }
  @keyframes forgefail{
    0%,100%{transform:translateX(0)}
    20%    {transform:translateX(-10px)}
    40%    {transform:translateX(10px)}
    60%    {transform:translateX(-6px)}
    80%    {transform:translateX(6px)}
  }
  .forge-success{animation:forgesuccess 700ms ease-out;will-change:opacity}

<body>
<div id="root"></div>
<script type="text/babel">
/* ─── PARTICLE ENGINE ──────────────────────────────────────────────── */
/* Performant canvas overlay using typed-array pool — no GC during play */
const Particles=(()=>{
  const MAX=500;
  let cvs=null,cx=null,raf=null,last=0;
  let suppressed=false;  // set true during offline sim

  // typed-array pool — all particle data in flat arrays
  const px  =new Float32Array(MAX);
  const py  =new Float32Array(MAX);
  const pvx =new Float32Array(MAX);
  const pvy =new Float32Array(MAX);
  const plif=new Float32Array(MAX);  // remaining life (seconds)
  const pmax=new Float32Array(MAX);  // max life
  const psz =new Float32Array(MAX);  // radius
  const pcol=new Array(MAX).fill('#fff');
  const palv=new Uint8Array(MAX);    // 0=dead 1=alive
  const palpha=new Float32Array(MAX); // peak alpha per particle
  const pexp =new Uint8Array(MAX);    // 1=expand over lifetime
  const pgrav=new Float32Array(MAX);  // per-particle gravity multiplier
  let   head=0;                      // ring write cursor

  function init(){
    if(cvs) return;
    cvs=document.createElement('canvas');
    cvs.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:50';
    document.body.appendChild(cvs);
    cx=cvs.getContext('2d');
    resize();
    window.addEventListener('resize',resize,{passive:true});
  }

  function resize(){
    if(!cvs) return;
    cvs.width=window.innerWidth;
    cvs.height=window.innerHeight;
  }

  function spawn(x,y,vx,vy,life,sz,col,alpha,expand,grav){
    px[head]=x; py[head]=y;
    pvx[head]=vx; pvy[head]=vy;
    pmax[head]=plif[head]=life;
    psz[head]=sz;
    pcol[head]=col;
    palpha[head]=alpha||0.55;
    pexp[head]=expand?1:0;
    pgrav[head]=grav!=null?grav:1;
    palv[head]=1;
    head=(head+1)%MAX;
  }

  /* ── burst from pixel coords ────────────────────────── */
  function burst(x,y,n,col,opts){
    if(suppressed||document.hidden) return;  // no particles when tab inactive or sim running
    init();
    const{
      speed=190,
      spread=Math.PI*2,
      angle=-Math.PI/2,
      sizeMin=2,
      sizeMax=5,
      lifeMin=0.8,
      lifeMax=4.0,
      maxAlpha=0.55,
      expand=false,
      gravityMin=1,
      gravityMax=1,
    }=opts||{};
    const lifeRange=lifeMax-lifeMin;
    for(let i=0;i<n;i++){
      const a=angle+(Math.random()-.5)*spread;
      const s=speed*(0.4+Math.random()*0.9);
      // skewed life: r^2 gives mostly short with some long outliers
      const r=Math.random();
      const life=lifeMin+r*r*lifeRange;
      spawn(
        x+(Math.random()-.5)*12,
        y+(Math.random()-.5)*6,
        Math.cos(a)*s,
        Math.sin(a)*s,
        life,
        sizeMin+Math.random()*(sizeMax-sizeMin),
        col,
        maxAlpha,
        expand,
        gravityMin+(Math.random()*(gravityMax-gravityMin))
      );
    }
    if(!raf) raf=requestAnimationFrame(loop);
  }

  /* ── burst anchored to center of a DOM element (passive) ── */
  function burstEl(el,n,col,opts){
    if(!el) return;
    const r=el.getBoundingClientRect();
    burst(r.left+r.width*0.5, r.top+r.height*0.5, n, col, opts);
  }

  /* ── animation loop ──────────────────────────────────── */
  function loop(ts){
    const dt=Math.min((ts-last)*0.001,0.05);
    last=ts;
    cx.clearRect(0,0,cvs.width,cvs.height);
    // compute drag factors once per frame, not per particle
    const dragX=Math.pow(0.93,dt*60);
    const dragY=Math.pow(0.96,dt*60);
    let living=0;
    for(let i=0;i<MAX;i++){
      if(!palv[i]) continue;
      plif[i]-=dt;
      if(plif[i]<=0){palv[i]=0;continue;}
      pvy[i]+=90*pgrav[i]*dt;  // gentle gravity (per-particle scale)
      pvx[i]*=dragX;
      pvy[i]*=dragY;
      px[i]+=pvx[i]*dt;
      py[i]+=pvy[i]*dt;
      // opacity: fade in on 0-15% life elapsed, fade out on last 50%
      const a=plif[i]/pmax[i]; // 1=just spawned, 0=dead
      const peak=palpha[i];
      cx.globalAlpha=a<0.5?(a/0.5)*peak:peak;
      cx.fillStyle=pcol[i];
      // expand=1: grow over life; expand=0: slight shrink toward end
      const r=pexp[i]?psz[i]*(0.3+(1-a)*1.8):psz[i]*(0.5+a*0.5);
      cx.fillRect(px[i]-r,py[i]-r,r*2,r*2);
      living++;
    }
    cx.globalAlpha=1;
    raf=living>0?requestAnimationFrame(loop):null;
  }

  return{burst,burstEl,suppress(v){suppressed=!!v;}};
})();

/* ─── PROCEDURAL SFX ENGINE ───────────────────────────────────────── */
const SFX=(()=>{
  let ctx=null,master=null,warm=null,verb=null,verbWet=null,verbDry=null,shaper=null;
  let vol=0.5,muted=false;
  const CH={res:true,hit:true,upgrade:true,mod:true,forge:true,prestige:true,ready:true};
  function ch(k){return !muted&&CH[k];}

  const TONES={α:247,β:311,γ:370,δ:466};  // B3 Eb4 F#4 Bb4 (warmer voicing)
  const QTONE=[415,494,622,740,932];        // Ab4 B4 Eb5 F#5 Bb5

  function init(){
    if(ctx) return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    // warm low-pass to tame highs globally
    warm=ctx.createBiquadFilter();warm.type='lowpass';
    warm.frequency.value=3800;warm.Q.value=0.5;
    master=ctx.createGain();
    master.gain.value=vol;
    warm.connect(master);master.connect(ctx.destination);
    // reverb impulse (0.6s exponential decay — longer tail for warmth)
    const len=ctx.sampleRate*0.6, buf=ctx.createBuffer(2,len,ctx.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.0);
    }
    verb=ctx.createConvolver();verb.buffer=buf;
    verbWet=ctx.createGain();verbWet.gain.value=0.4;
    verbDry=ctx.createGain();verbDry.gain.value=1;
    verb.connect(verbWet);verbWet.connect(warm);
    verbDry.connect(warm);
    // waveshaper for distortion
    const n=256,curve=new Float32Array(n);
    for(let i=0;i<n;i++){const x=i*2/n-1;curve[i]=Math.tanh(2.0*x);}
    shaper=ctx.createWaveShaper();shaper.curve=curve;shaper.oversample='2x';
  }

  function ensureCtx(){
    if(!ctx) init();
    if(ctx.state==='suspended') ctx.resume();
  }

  // warm = default dest (through low-pass → master)
  function dst(d){return d||warm;}

  function osc(type,freq,t,dur,gain,dest){
    const o=ctx.createOscillator(),g=ctx.createGain();
    if(!isFinite(t)||!isFinite(dur)) return; // bail if time is invalid
    o.type=type;o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(dst(dest));
    o.start(t);o.stop(t+dur+0.05);
  }

  function noise(t,dur,gain,freq,q,dest){
    if(!isFinite(t)||!isFinite(dur)) return; // bail if time is invalid
    const len=Math.ceil(ctx.sampleRate*dur);
    const buf=ctx.createBuffer(1,len,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource();src.buffer=buf;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';
    bp.frequency.setValueAtTime(freq,t);bp.Q.setValueAtTime(q||0.8,t);
    const g=ctx.createGain();g.gain.setValueAtTime(gain,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(bp);bp.connect(g);g.connect(dst(dest));
    src.start(t);src.stop(t+dur+0.05);
  }

  // vibrato oscillator — LFO onset delayed so attack is clean, wobble develops
  function vibratoOsc(freq,start,dur,gain,rate,depth,dest,onsetDelay){
    const o=ctx.createOscillator(),g=ctx.createGain();
    const lfo=ctx.createOscillator(),lfoGain=ctx.createGain();
    o.type='sine';o.frequency.setValueAtTime(freq,start);
    lfo.type='sine';lfo.frequency.setValueAtTime(rate,start);
    // fade LFO in after onset so transient stays tight
    const od=onsetDelay||0.06;
    lfoGain.gain.setValueAtTime(0,start);
    lfoGain.gain.linearRampToValueAtTime(freq*depth,start+od);
    lfo.connect(lfoGain);lfoGain.connect(o.frequency);
    g.gain.setValueAtTime(0.001,start);
    g.gain.linearRampToValueAtTime(gain,start+0.008);   // 8ms attack — clean onset
    g.gain.exponentialRampToValueAtTime(0.001,start+dur);
    o.connect(g);g.connect(dst(dest));
    o.start(start);o.stop(start+dur+0.05);
    lfo.start(start);lfo.stop(start+dur+0.05);
  }

  // ── cooldown ready ─────────────────────────────────────────────────
  function ready(tier){
    ensureCtx();if(!ch('ready')) return;
    const t=ctx.currentTime;
    const base=TONES[tier]||247;
    // 3-note ascending chime: fifth below → root → major third
    osc('sine',base*0.75, t,        0.12, 0.05);
    osc('sine',base,      t+0.07,   0.16, 0.08);
    osc('sine',base*1.25, t+0.15,   0.22, 0.07, verb);  // reverb tail on top note
    osc('sine',base*0.5,  t+0.05,   0.14, 0.03, verb);  // soft sub with space
  }

  // ── resource gain ──────────────────────────────────────────────────
  function res(tier,amt,maxAmt,isProc,isChain,isHarvest){
    ensureCtx();if(!ch('res')) return;
    const t=ctx.currentTime;
    if(!isFinite(t)||!isFinite(amt)||!isFinite(maxAmt)) return; // bail if any time/amount is invalid
    if(amt<=0||maxAmt<=0) return; // no sound for zero/negative amounts
    const base=TONES[tier]||247;
    const ratio=Math.min(amt/(maxAmt||1),5);
    const sweep=base*(1+0.12*ratio);
    const dur=0.14+0.14*ratio;            // longer base + steeper scaling
    const big=ratio>=2;
    const huge=ratio>=3;
    const mega=ratio>=5;

    // soft attack envelope on main tone to avoid click
    const oMain=ctx.createOscillator(),gMain=ctx.createGain();
    oMain.type='sine';oMain.frequency.setValueAtTime(base,t);
    gMain.gain.setValueAtTime(0.001,t);
    gMain.gain.linearRampToValueAtTime(big?0.2:0.16, t+0.012);
    gMain.gain.exponentialRampToValueAtTime(0.001,t+dur*1.2);
    oMain.connect(gMain);gMain.connect(warm);
    oMain.start(t);oMain.stop(t+dur*1.2+0.05);
    osc('sine',base*0.5,t,dur,big?0.1:0.06);
    osc('triangle',sweep,t+0.01,dur*0.6,0.03);

    if(big){
      osc('sine',base*1.25,t+0.01,dur*0.9,0.07);
      noise(t,dur*0.4,0.04,base*3,2);
    }
    if(huge){
      osc('sine',base*2,t+0.02,dur*1.6,0.06,verb);
      osc('sine',base*2*1.003,t+0.02,dur*1.6,0.04,verb);
      osc('sine',base*0.25,t,dur*0.8,0.05);
    }
    if(mega){
      [1,1.25,1.5,2].forEach((m,i)=>{
        osc('sine',base*m*2,t+0.03+i*0.05,0.18,0.05,verb);
      });
      noise(t+0.02,dur*0.5,0.05,base*5,1.5,verb);
    }

    if(isProc){
      const pdur=dur*1.5;
      osc('sine',base*1.5,t+0.02,pdur,0.1);
      osc('sine',base*1.5*1.003,t+0.02,pdur,0.07);
      if(big) osc('sine',base*1.5*0.5,t+0.02,pdur*0.7,0.04);
    }
    if(isChain){
      osc('sine',base*1.25,t+0.06,0.14,0.1);
      osc('sine',base*1.25,t+0.18,0.1,0.06);
    }
    if(isHarvest){
      const tones=[247,311,370,466];
      tones.forEach((f,i)=>osc('sine',f*1.5,t+i*0.06,0.16,0.1));
    }
  }

  // ── blocked (0 dmg) ────────────────────────────────────────────────
  function block(){
    ensureCtx();if(!ch('hit')) return;
    const t=ctx.currentTime;
    if(!isFinite(t)) return; // bail if time is invalid
    // soft muffled thud
    noise(t,      0.035, 0.07, 600,  2.5);   // body thud
    noise(t+0.01, 0.02,  0.04, 280,  1.2);   // low cloth texture
    osc('triangle', 110, t,      0.03, 0.06); // warm low body
    osc('sine',      55, t+0.01, 0.04, 0.04); // sub thump
  }

  // ── damage hit ─────────────────────────────────────────────────────
  // magnitude = roll quality (0=min roll, 1=max/crit)
  // bossRatio  = dmg/maxHp — how much this hit mattered to the boss
  function hit(dmg,dmgBeforeDef,isCrit,isKill,dmgMin,dmgMax,bossRatio){
    ensureCtx();if(!ch('hit')) return;
    const t=ctx.currentTime;
    if(!isFinite(t)) return; // bail if time is invalid
    const span=Math.max(1,(dmgMax||1)-(dmgMin||0));
    const magnitude=Math.min(Math.max(0,(dmgBeforeDef-(dmgMin||0))/span),1);
    const br=Math.min(bossRatio||0,1);
    const durBase=0.16+0.22*magnitude;
    const dur=durBase*(1+br*0.8);

    // ── sub punch — short fast-decaying sine gives felt weight without harshness
    const subFreq=isCrit?40:(62-18*magnitude);
    const subG=ctx.createGain();
    subG.gain.setValueAtTime(isCrit?0.28:0.18+0.12*magnitude, t);
    subG.gain.exponentialRampToValueAtTime(0.001, t+0.12+0.06*magnitude);
    const subO=ctx.createOscillator();
    subO.type='sine';
    subO.frequency.setValueAtTime(subFreq*1.4, t);             // starts slightly higher
    subO.frequency.exponentialRampToValueAtTime(subFreq, t+0.04); // drops into body
    subO.connect(subG);subG.connect(warm);
    subO.start(t);subO.stop(t+0.2);

    // ── body thud — low bandpass noise, short, gives the "padded" feel
    noise(t, 0.022+0.018*magnitude, 0.07+0.06*magnitude, 140+80*magnitude, 1.2+magnitude*0.6);

    // ── vibrato tone body — warm, spatial, drifty
    const f=subFreq*2*(1+(Math.random()-0.5)*0.06);
    const vibratoRate =1.6+Math.random()*1.4;
    const vibratoDepth=0.007+Math.random()*0.006+br*0.008;
    const onsetDelay  =0.03+magnitude*0.03;

    vibratoOsc(f,     t, dur*(isCrit?2.0:1.5), isCrit?0.13:0.10+0.05*magnitude, vibratoRate,     vibratoDepth,     verb, onsetDelay);
    vibratoOsc(f*2,   t, dur*0.7,              isCrit?0.05:0.03+0.02*magnitude, vibratoRate*1.2, vibratoDepth*0.6, verb, onsetDelay*0.7);
    vibratoOsc(f*0.5, t, dur*0.65,             0.025+0.025*magnitude,           vibratoRate*0.5, vibratoDepth*0.4, verb, onsetDelay*1.2);
    if(isCrit) vibratoOsc(f*0.5, t, dur*2.2,  0.06, vibratoRate*0.5, vibratoDepth, verb, 0.1);

    // ── air brush — soft high-mid noise tail through reverb
    const bpFreq=480-160*magnitude;
    noise(t+0.018, dur*(isCrit?1.1:0.9), isCrit?0.04:0.028+0.012*magnitude, bpFreq, isCrit?1.6:3.0, verb);

    if(isCrit){
      const dur2=dur*2.2;
      vibratoOsc(f*0.5,t,dur2,0.06,vibratoRate*0.5,vibratoDepth,verb);
      const g=ctx.createGain();g.gain.setValueAtTime(0.025,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur2);
      const o=ctx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(f*3,t);
      o.frequency.exponentialRampToValueAtTime(f*1.5,t+dur2);
      o.connect(g);g.connect(verb);
      o.start(t);o.stop(t+dur2+0.05);
    }

    if(isKill){
      const root=196;
      osc('sine',root,      t+0.05,0.7,0.10,verb);
      osc('sine',root*1.5,  t+0.09,0.65,0.07,verb);
      osc('sine',root*2,    t+0.13,0.55,0.05,verb);
      osc('sine',root*0.5,  t+0.05,0.75,0.04,verb);
    }
  }

  // ── upgrade bought (warm, playful, drifting upward) ─────────────────
  function upgrade(resTier,isPrestige,count){
    ensureCtx();if(!ch('upgrade')) return;
    const t=ctx.currentTime;
    // cap base at 311Hz so upper notes never go shrill
    const base=Math.min(TONES[resTier]||247,311);
    const n=Math.min(count||1,5);
    const spacing=0.07+n*0.007;
    // random per-call drift: each purchase sounds slightly different
    const callDrift=0.96+Math.random()*0.08;  // ±4% base pitch scatter

    for(let i=0;i<n;i++){
      const tt=t+i*spacing;
      // upward drift per note + random micro-jitter for playfulness
      const jitter=1+(Math.random()-0.5)*0.04;
      const freq=base*callDrift*(1+i*0.04)*jitter;  // gentler ascent (was 0.05)
      const dur=0.38+i*0.07;

      // warm sine body with pitch glide — starts slightly below, drifts up
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(freq*0.97,tt);
      o.frequency.linearRampToValueAtTime(freq*1.02,tt+dur*0.4);  // playful upward nudge
      o.frequency.linearRampToValueAtTime(freq,tt+dur);
      g.gain.setValueAtTime(0.001,tt);
      g.gain.linearRampToValueAtTime(0.1,tt+0.025);               // soft attack
      g.gain.exponentialRampToValueAtTime(0.001,tt+dur);
      o.connect(g);g.connect(warm);
      o.start(tt);o.stop(tt+dur+0.05);

      // detuned chorus — also glides
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.type='sine';
      o2.frequency.setValueAtTime(freq*0.97*1.004,tt);
      o2.frequency.linearRampToValueAtTime(freq*1.02*1.004,tt+dur*0.4);
      o2.frequency.linearRampToValueAtTime(freq*1.004,tt+dur);
      g2.gain.setValueAtTime(0.001,tt);
      g2.gain.linearRampToValueAtTime(0.05,tt+0.03);
      g2.gain.exponentialRampToValueAtTime(0.001,tt+dur*0.9);
      o2.connect(g2);g2.connect(warm);
      o2.start(tt);o2.stop(tt+dur+0.05);

      // soft sub
      osc('sine',freq*0.5,tt,dur*0.65,0.035);

      if(isPrestige){
        osc('sine',freq*1.5,tt+0.04,dur*1.3,0.045,verb);
        osc('sine',freq*1.503,tt+0.04,dur*1.3,0.025,verb);
      }
    }
  }

  // ── mod trigger — 6 distinct sound identities ─────────────────────
  // effect: 'mult'|'chain'|'bonk'|'harvest'|'lucky'|'echo'
  // quality: item quality 1-5
  // res: resource tier key for pitch
  // mult: multiplier value (2/3/5) for mult procs
  function mod(effect,quality,res,mult){
    ensureCtx();if(!ch('mod')) return;
    const t=ctx.currentTime;
    if(!isFinite(t)) return;
    const base=TONES[res]||247;
    const q=Math.max(0,Math.min((quality||1)-1,4));

    if(effect==='mult'){
      // ── shimmering upward arpeggio — bigger mult = more layers + reverb
      const steps=mult>=5?5:mult>=3?4:3;
      const rootFreq=base*(1+q*0.1);
      const ratios=[1,1.25,1.5,2,2.5];
      for(let i=0;i<steps;i++){
        const tt=t+i*0.055;
        const f=rootFreq*ratios[i];
        const dur=0.3+i*0.06;
        osc('sine',f,    tt,dur,  0.1,mult>=3?verb:warm);
        osc('sine',f*1.004,tt,dur*0.9,0.05,mult>=3?verb:warm);
      }
      // sub bloom under full arp
      osc('sine',rootFreq*0.5,t,0.5+q*0.06,0.06);
      if(mult>=5){
        // sparkle rain after arp
        [1,1.333,1.667,2].forEach((r,i)=>
          osc('sine',rootFreq*r*2,t+0.28+i*0.04,0.18,0.04,verb));
      }
    }
    else if(effect==='chain'){
      // ── light two-note drop
      const f=base*(1.5+q*0.15);
      osc('sine',f,      t,       0.08, 0.12);
      osc('sine',f*0.79, t+0.09,  0.09, 0.09);
      // subtle snap
      noise(t,0.015,0.06,1200,5);
    }
    else if(effect==='bonk'){
      // ── meaty thump-crack: sub punch + smack noise
      const thump=45+q*8;
      osc('sine',thump,      t,      0.22, 0.22);
      osc('sine',thump*2,    t,      0.12, 0.09);
      osc('sine',thump*0.5,  t,      0.18, 0.08);
      // impact smack — sharper bandpass
      noise(t,      0.03,  0.16, 1400, 6);
      noise(t+0.02, 0.09,  0.07, 400,  2);
      // brief ringing overtone
      osc('sine',thump*4,    t+0.01, 0.12, 0.04, verb);
    }
    else if(effect==='harvest'){
      // ── lush 4-voice chord swell across all resource tones
      const allTones=[247,311,370,466];
      allTones.forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f*(1+q*0.04);
        g.gain.setValueAtTime(0.001,t);
        g.gain.linearRampToValueAtTime(0.06,t+0.08+i*0.03);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.7+i*0.08);
        o.connect(g);g.connect(verb);
        o.start(t);o.stop(t+0.85+i*0.08);
      });
      // shimmer octave above
      allTones.forEach((f,i)=>
        osc('sine',f*2,t+0.1+i*0.04,0.4,0.025,verb));
      // golden sub bloom
      osc('sine',allTones[0]*0.5,t,0.6,0.06);
    }
    else if(effect==='lucky'){
      // ── lottery jingle: ascending 3-note ding + sparkle tail
      const lf=base*(1.2+q*0.08);
      osc('sine',lf,      t,      0.18, 0.12);
      osc('sine',lf*1.25, t+0.09, 0.22, 0.13, verb);
      osc('sine',lf*1.5,  t+0.18, 0.35, 0.14, verb);
      // detuned doubles for shimmer
      osc('sine',lf*1.004,    t,      0.18, 0.04);
      osc('sine',lf*1.25*1.004,t+0.09,0.22, 0.04, verb);
      osc('sine',lf*1.5*1.004, t+0.18,0.35, 0.05, verb);
      // sparkle tail
      [1,1.333,1.667,2].forEach((r,i)=>
        osc('sine',lf*r,t+0.3+i*0.05,0.2,0.03,verb));
    }
    else if(effect==='echo'){
      // ── delay ping that bounces and fades
      const ef=base*(1+q*0.12);
      const delays=[0, 0.18, 0.34, 0.48];
      const gains=[0.12, 0.08, 0.05, 0.03];
      delays.forEach((dl,i)=>{
        osc('sine',ef,     t+dl, 0.2-i*0.02, gains[i], i>0?verb:warm);
        osc('sine',ef*1.5, t+dl+0.02, 0.14, gains[i]*0.4, verb);
      });
    }
  }

  // ── forge ──────────────────────────────────────────────────────────
  function forge(success,level,shattered){
    ensureCtx();if(!ch('forge')) return;
    const t=ctx.currentTime;
    const lvlScale=Math.min(level/10,1);  // 0–1 for duration scaling

    // anvil hit (always) — warmer
    noise(t,0.06,0.14,2200,3);
    osc('triangle',600,t,0.05,0.1);
    osc('sine',120,t,0.08,0.06);

    if(success){
      const freq=Math.min(500+level*70, 1400);  // cap at ~1.4kHz
      const dur=0.24+lvlScale*0.22;
      osc('sine',freq,t+0.08,dur,0.13);
      osc('sine',freq*2.01,t+0.08,dur*0.8,0.05);
      osc('sine',freq*0.5,t+0.08,dur*0.7,0.04);
      if(level>=7){
        for(let i=0;i<5;i++){
          const sf=600+Math.random()*700;         // sparkle range capped at ~1.3kHz
          osc('sine',sf,t+0.14+i*0.05,0.1+lvlScale*0.05,0.035);
        }
      }
      osc('sine',freq*1.5,t+0.16,dur*1.0,0.08,verb);
    } else if(shattered){
      // harsh but warm noise + descending sweep
      noise(t+0.08,0.4,0.16,1100,0.8);
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle';
      o.frequency.setValueAtTime(500,t+0.08);
      o.frequency.exponentialRampToValueAtTime(45,t+0.48);
      g.gain.setValueAtTime(0.12,t+0.08);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
      o.connect(shaper);shaper.connect(g);g.connect(warm);
      o.start(t+0.08);o.stop(t+0.55);
    } else {
      // downgrade: descending tone + soft crumble
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(350,t+0.08);
      o.frequency.exponentialRampToValueAtTime(120,t+0.3);
      g.gain.setValueAtTime(0.1,t+0.08);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.33);
      o.connect(g);g.connect(warm);
      o.start(t+0.08);o.stop(t+0.38);
      noise(t+0.1,0.15,0.05,500,1.2);
    }
  }

  // ── enemy killed — triumphant resolution chord ────────────────────
  function kill(fightId){
    ensureCtx();if(!ch('hit')) return;
    const t=ctx.currentTime;
    // root pitch climbs slightly per enemy tier, stays warm/major
    const root=196*Math.pow(1.04,Math.min(fightId||0,12));
    // major chord: root, maj3rd, p5th, octave
    const freqs=[root, root*1.25, root*1.5, root*2];
    freqs.forEach((f,i)=>{
      const tt=t+i*0.055;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(f*0.98,tt);
      o.frequency.linearRampToValueAtTime(f,tt+0.08);
      g.gain.setValueAtTime(0.001,tt);
      g.gain.linearRampToValueAtTime(0.1-i*0.015,tt+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,tt+0.9-i*0.08);
      o.connect(g);g.connect(verb);
      o.start(tt);o.stop(tt+1.0);
      // detuned double for richness
      const o2=ctx.createOscillator(),g2=ctx.createGain();
      o2.type='sine';o2.frequency.value=f*1.003;
      g2.gain.setValueAtTime(0.001,tt);
      g2.gain.linearRampToValueAtTime(0.03-i*0.005,tt+0.05);
      g2.gain.exponentialRampToValueAtTime(0.001,tt+0.75);
      o2.connect(g2);g2.connect(verb);
      o2.start(tt);o2.stop(tt+0.85);
    });
    // soft shimmer tail on octave+5th
    osc('sine',root*3,   t+0.22,0.6,0.03,verb);
    osc('sine',root*2.5, t+0.28,0.55,0.025,verb);
  }

  // ── prestige earned — triumphant resolution chord ────────────────
  function prestige(){
    ensureCtx();if(!ch('prestige')) return;
    const t=ctx.currentTime;
    // warm pad swell — detuned sines with longer sustain
    [196,196*1.003,294,294*0.997,392].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.001,t);
      g.gain.linearRampToValueAtTime(0.045,t+0.4);
      g.gain.exponentialRampToValueAtTime(0.001,t+2.0);
      o.connect(g);g.connect(verb||warm);
      o.start(t);o.stop(t+2.1);
    });
  }

  // ── volume control ─────────────────────────────────────────────────
  function setVol(v){
    vol=Math.max(0,Math.min(1,v));
    if(master) master.gain.setValueAtTime(vol,ctx.currentTime);
    try{localStorage.setItem('sfx.vol',vol);}catch(e){}
  }
  function getVol(){return vol;}
  function setMute(m){
    muted=!!m;
    try{localStorage.setItem('sfx.muted',muted?'1':'0');}catch(e){}
  }
  function isMuted(){return muted;}
  function getCh(k){return CH[k]!==false;}
  function setCh(k,v){CH[k]=!!v;try{localStorage.setItem('sfx.ch.'+k,v?'1':'0');}catch(e){}}
  function getChannels(){return{...CH};}

  // restore persisted prefs
  try{
    const sv=localStorage.getItem('sfx.vol');
    if(sv!==null) vol=parseFloat(sv)||0.5;
    const sm=localStorage.getItem('sfx.muted');
    if(sm==='1') muted=true;
    for(const k of Object.keys(CH)){
      const sc=localStorage.getItem('sfx.ch.'+k);
      if(sc==='0') CH[k]=false;
    }
  }catch(e){}

  return{ready,res,hit,kill,block,upgrade,mod,forge,prestige,setVol,getVol,setMute,isMuted,getCh,setCh,getChannels,init};
})();

/* ─── FORGE CORE LOGIC ───────────────────────────────────────────── */

/**
 * Process a forge attempt with stat/level improvement
 * @param {Object} state - Current game state
 * @param {Object} action - Forge action with itemId, consIds, protectQ, luckBonus, forgeMode
 * @param {Object} FORGE_CHANCES - Forge success chances by level
 * @param {Object} MOD_DEFS - Mod definitions
 * @returns {Object} Updated state
 */
function doForge(state, action, FORGE_CHANCES, MOD_DEFS, le, iLbl) {
  const { itemId, consIds, protectQ, luckBonus, forgeMode, hasStatForce, hasFull } = action;
  const item = { ...state.inv.find(i => i.id === itemId) };
  if (!item) return state;

  const targetLvl = item.upgradeLevel + 1;
  if (targetLvl > 9) return state;

  const chance = Math.min(100, FORGE_CHANCES[targetLvl - 1] + luckBonus);
  const success = Math.random() * 100 < chance;
  const newInv = state.inv.filter(i => i.id !== itemId && !consIds.includes(i.id));
  const def = MOD_DEFS[item.modId];

  // Determine what to improve
  let improveStat = forgeMode !== 'level';
  if (hasStatForce) improveStat = true;   // stat-force item forces stat improvement
  if (hasFull) improveStat = 'both';      // full shard improves both
  // Proc mods (x2/x3/x5, effect procs) only have a % chance stat; always improve it
  if (improveStat !== 'both' && def && def.type !== 'stat') improveStat = true;

  let logMsg;
  if (success) {
    item.upgradeLevel = targetLvl;

    if (improveStat === 'both') {
      // Full shard: improve both stat and proc chance
      if (def.type === 'stat') {
        item.value = def.float ? parseFloat((item.value + def.perLvl).toFixed(2)) : item.value + def.perLvl;
      } else {
        item.chance = Math.min(95, item.chance + def.perLvl);
      }
      // Also improve the other type
      if (def.type === 'stat') {
        if (!item.chance) {
          item.chance = Math.min(95, (item.proc || 0) + def.perLvl);
        }
      } else {
        item.value = (item.value || 0) + def.perLvl;
      }
      logMsg = le(`★ forged to +${targetLvl} (stat+%) ${iLbl(item)}`, '#f59e0b', 'F');
    } else if (improveStat) {
      // Stat improvement
      if (def.type === 'stat') {
        item.value = def.float ? parseFloat((item.value + def.perLvl).toFixed(2)) : item.value + def.perLvl;
      } else {
        item.chance = Math.min(95, item.chance + def.perLvl);
      }
      logMsg = le(`★ forged to +${targetLvl}  ${iLbl(item)}`, '#4ade80', 'F');
    } else {
      // Level-only improvement
      logMsg = le(`★ forged to +${targetLvl}  ${iLbl(item)}`, '#4ade80', 'F');
    }

    newInv.push(item);
  } else {
    if (protectQ) {
      // Epic prot (q:4): 50% fully preserved, 50% -1 level
      // Rare prot (q:3): always -1 level
      const saved = protectQ >= 4 ? Math.random() < 0.5 : false;
      if (saved) {
        // No penalty at all
        logMsg = le(`✗ forge failed  ★ protected  +${item.upgradeLevel}`, '#fbbf24', 'F');
      } else {
        item.upgradeLevel = Math.max(0, item.upgradeLevel - 1);
        if (improveStat === 'both' || improveStat) {
          if (def.type === 'stat') {
            const nv = item.value - def.perLvl;
            item.value = def.float ? parseFloat(Math.max(item.baseValue, nv).toFixed(2)) : Math.max(item.baseValue, Math.round(nv));
          } else {
            item.chance = Math.max(item.baseChance, item.chance - def.perLvl);
          }
        }
        logMsg = le(`✗ forge failed  protected → +${item.upgradeLevel}`, '#f87171', 'F');
      }
      newInv.push(item);
    } else {
      logMsg = le(`✗ ${iLbl(item)} SHATTERED`, '#ef4444', 'F');
    }
  }

  return { ...state, inv: newInv, log: [logMsg, ...state.log].slice(0, 80) };
}

/**
 * Get forge consumable bonuses from inventory
 * @param {Array} conItems - Array of consumable items
 * @returns {Object} { luckBonus, protectQ, hasStatForce, hasFull, hasReroll }
 */
function getForgeConsumableBonuses(conItems) {
  const LUCK_BONUSES={1:10,2:15,3:20,4:25,5:30};
  let luckBonus=0;
  const luckItems=conItems.filter(c=>c?.subtype==='luck');
  for(const item of luckItems){
    const q=item.q||1;
    luckBonus+=(LUCK_BONUSES[q]||10);
  }
  const protectItem=conItems.find(c=>c?.subtype==='protect');
  const protectQ=protectItem?protectItem.q:null;
  const hasStatForce=conItems.some(c=>c?.subtype==='stat');
  const hasFull=conItems.some(c=>c?.subtype==='full');
  const hasReroll=conItems.some(c=>c?.subtype==='reroll');

  return{ luckBonus, protectQ, hasStatForce, hasFull, hasReroll };
}

/**
 * Format consumable item label
 * @param {Object} item - Consumable item
 * @returns {string} Formatted label
 */
function getConsumableLabel(item) {
  const QNAME=['C','U','R','E','L'];
  const labels = {
    protect: 'shard.prot',
    luck:    'shard.luck',
    stat:    'shard.stat',
    full:    'shard.full',
    reroll:  'shard.reroll',
    refund:  'shard.refund',
  };
  let label=labels[item.subtype]||'consumable';
  if((item.subtype==='luck'||item.subtype==='protect')&&item.q){
    const qName=QNAME[item.q-1]||'?';
    label+=` [${qName}]`;
  }
  if(item.subtype==='refund'&&item.q){
    const qName=QNAME[item.q-1]||'?';
    label+=` [${qName}]`;
  }
  return label;
}

/**
 * Get consumable description
 * @param {Object} item - Consumable item
 * @returns {string} Consumable description
 */
function getConsumableDescription(item) {
  const QFULL=['Common','Uncommon','Rare','Epic','Legendary'];
  const LUCK_BONUSES={1:10,2:15,3:20,4:25,5:30};
  const PROT_DESC={
    3:'on forge fail: −1 level instead of destroy',
    4:'on forge fail: 50% no penalty | 50% −1 level',
    5:'forge attempt costs 0 ✨',
  };
  if(item.subtype==='protect'){
    return PROT_DESC[item.q]||'on forge fail: −1 level instead of destroy';
  }
  if(item.subtype==='luck'&&item.q){
    const bonus=LUCK_BONUSES[item.q]||10;
    const qName=QFULL[item.q-1]||'?';
    return `forge: +${bonus}% success chance [${qName}]`;
  }
  if(item.subtype==='refund'&&item.pct!=null){
    const qName=QFULL[item.q-1]||'?';
    return `on upgrade buy: ${item.chance}% chance to refund ${item.pct}% of the spent cost [${qName}]`;
  }
  const descriptions = {
    stat:   'forge: force stat improvement',
    full:   'forge: improve stat + proc %',
    reroll: 'reroll base stat within quality range (keeps levels)',
  };
  return descriptions[item.subtype]||'unknown consumable';
}

/**
 * Check if a consumable can be applied to a mod
 * stat & legendary only work on stat-type mods (not proc mods)
 * protect & luck work on any mod
 * @param {Object} consumable - Consumable item
 * @param {Object} mod - Mod item  
 * @param {Object} MOD_DEFS - Mod definitions
 * @returns {boolean} Whether consumable is applicable
 */
function canApplyConsumable(consumable, mod, MOD_DEFS) {
  if (!consumable || !mod) return false;
  const def = MOD_DEFS[mod.modId];
  const subtype = consumable.subtype;
  // protect, luck, reroll work on any mod
  if (subtype === 'protect' || subtype === 'luck' || subtype === 'reroll') return true;
  // stat & full only work on stat-type mods
  if (subtype === 'stat' || subtype === 'full') {
    return def && def.type === 'stat';
  }
  return true;
}

// Weighted quality roll. lW = direct Legendary probability override (applied before normal pool).
function rollQuality(lMin,lMax,lW){
  // lW: e.g. 0.001 = 0.1% guaranteed L chance regardless of lMax
  if(lW&&Math.random()<lW) return 5;
  const W=[40,28,18,10,4]; // C U R E L
  let total=0;const pool=[];
  for(let q=lMin;q<=Math.min(lMax,5);q++){total+=W[q-1];pool.push({q,w:W[q-1]});}
  let r=Math.random()*total;
  for(const{q,w}of pool){r-=w;if(r<=0)return q;}
  return Math.min(lMax,5);
}

let _iid=Date.now(); // timestamp-based seed ensures unique IDs across page reloads
let _offlineBootData=null; // set by App init if offline time detected, consumed on mount
function mkDrop(lMin,lMax,maxResIdx=3,lW){
  if(maxResIdx>0&&Math.random()<.12){
    const rand=Math.random();
    let subtype;
    if(rand<.40){
      // protect: quality R/E/L depending on enemy tier
      const q=Math.max(3,rollQuality(lMin,lMax,lW));
      return{id:++_iid,type:'consumable',subtype:'protect',q};
    }
    else if(rand<.70){
      // luck has rarity-based variants
      const q=rollQuality(lMin,lMax,lW);
      return{id:++_iid,type:'consumable',subtype:'luck',q};
    }
    else if(rand<.78) subtype='stat';
    else if(rand<.85) subtype='reroll';
    else if(rand<.93) subtype='full';
    else{
      // refund: U+ only
      if(lMax>=2){
        const q=Math.max(2,rollQuality(lMin,lMax,lW)); // U minimum
        const RPCT=[0,20,30,45,60];
        const RCHANCE=[0,15,25,40,60];
        return{id:++_iid,type:'consumable',subtype:'refund',q,pct:RPCT[q-1],chance:RCHANCE[q-1]};
      }
      subtype='full';
    }
    return{id:++_iid,type:'consumable',subtype};
  }
  const q=rollQuality(lMin,lMax,lW);
  // Tier-gated proc pool: C=stat only, U+=×2 procs, R+=×3 procs, E/L+=×5 procs
  const keys=Object.keys(MOD_DEFS).filter(k=>{
    const def=MOD_DEFS[k];
    if(def.type==='proc'){
      const mri=def.minResIdx!==undefined?def.minResIdx:(def.res?RES.indexOf(def.res):-1);
      if(mri>=0&&maxResIdx<mri) return false;
      if(def.minQ) return q>=def.minQ;
      const sfx=k.slice(-2); // '2x','3x','5x'
      return q>=(PROC_MIN_Q[sfx]||1);
    }
    const ri2=RES.indexOf(k[0]); // 'αMin'→0, 'dMin'→-1 (always ok)
    return ri2<0||ri2<=maxResIdx;
  });
  const modId=keys[ri(0,keys.length-1)];
  const def=MOD_DEFS[modId];
  const item={id:++_iid,type:'mod',modId,q,upgradeLevel:0};
  if(def.type==='stat'){
    const isMult=modId==='mMin'||modId==='mMax'||modId==='γcrd'||modId==='δexm'||modId==='δexx'||modId==='δppx';
    const[sMin,sMax]=QRANGE[q-1];
    const scale=sMin+Math.random()*(sMax-sMin);
    const bv=isMult
      ? parseFloat((def.base*scale).toFixed(2))
      : Math.max(def.base,Math.round(def.base*scale));
    item.value=bv; item.baseValue=bv;
  } else {
    // proc chance: base + tier bonus + small random variance
    const bc=Math.min(90,Math.round(def.base+QPROC[q-1]+(Math.random()*4-2)));
    item.chance=bc; item.baseChance=bc;
  }
  return item;
}

  const def=MOD_DEFS[item.modId];
  const lv=item.upgradeLevel>0?` +${item.upgradeLevel}`:'';

}

/* ─── MOD BONUS COMPUTATION ───────────────────────────────────────── */
function computeMods(slots,slotCount){
  const st={dMin:0,dMax:0,mMin:0,mMax:0,αMin:0,αMax:0,βMin:0,βMax:0,γMin:0,γMax:0,δMin:0,δMax:0,critChance:0,critDmg:0,dmgExpMin:0,dmgExpMax:0,ppMulti:0};
  const pr={α:[],β:[],γ:[],δ:[]};
  const chain={α:[],β:[],γ:[],δ:[]};
  const echo={α:[],β:[],γ:[],δ:[]};
  const bonk={α:[],β:[],γ:[],δ:[]};
  const harvest={α:[],β:[],γ:[],δ:[]};
  for(let i=0;i<slotCount;i++){
    const item=slots[i];
    if(!item||item.type!=='mod') continue;
    const def=MOD_DEFS[item.modId];
    if(def.type==='stat') st[def.stat]+=item.value;
    else{
      const eff=def.effect||'mult';
      if(eff==='mult')         pr[def.res].push({mult:def.mult,chance:item.chance,slotIdx:i});
      else if(eff==='chain')   chain[def.res].push({chance:item.chance,slotIdx:i});
      else if(eff==='echo')    echo[def.res].push({chance:item.chance,slotIdx:i});
      else if(eff==='bonk')    bonk[def.res].push({chance:item.chance,slotIdx:i});
      else if(eff==='harvest') harvest[def.res].push({chance:item.chance,slotIdx:i});
    }
  }
  return{st,pr,chain,echo,bonk,harvest};
}

const SAVE_KEY='boss.incremental.save';
const SAVE_VERSION=1;

// Fields that are purely runtime — never persisted
const TRANSIENT=new Set(['atkCd','lastTriggers','log','fightStartTime','runStartTime']);

function saveState(s){
  try{
    const snap={};
    for(const k of Object.keys(s)) if(!TRANSIENT.has(k)) snap[k]=s[k];
    localStorage.setItem(SAVE_KEY,JSON.stringify({v:SAVE_VERSION,s:snap,savedAt:Date.now()}));
  }catch(e){}
}

function migrate(raw,version){
  // backfill missing top-level stat objects (fixes NaN on old saves)
  if(!raw.atkTrig)           raw.atkTrig={α:0,β:0,γ:0,δ:0};
  if(!raw.costReduce)        raw.costReduce={α:0,β:0,γ:0,δ:0};
  if(!raw.freeChance)        raw.freeChance={α:0,β:0,γ:0,δ:0};
  if(!raw.luckyResetChance)  raw.luckyResetChance={α:0,β:0,γ:0,δ:0};
  if(!raw.beatCount)         raw.beatCount=ENEMIES.map(()=>0);
  if(!raw.totalPlayTime)     raw.totalPlayTime=0;
  // ensure slotCount is consistent with slotsDone (prestige-bought)
  if(raw.slotsDone) raw.slotCount=Math.max(raw.slotCount||3, 3+raw.slotsDone.filter(Boolean).length);
  if(!raw.pulvl) raw.pulvl=Object.fromEntries(Object.keys(UPG).map(k=>[k,0]));
  // backfill any UPG keys added after an existing save was created
  for(const k of Object.keys(UPG)){
    if(raw.ulvl  &&!(k in raw.ulvl))  raw.ulvl[k]=0;
    if(raw.pulvl &&!(k in raw.pulvl)) raw.pulvl[k]=0;
  }
  return raw;
}

function loadState(){
  try{
    const json=localStorage.getItem(SAVE_KEY);
    if(!json) {console.log('[LOAD] No save found'); return null;}
    const{v,s,savedAt}=JSON.parse(json);
    console.log('[LOAD] Loaded save v'+v, 'res:', s.res);
    return{state:migrate(s,v||0),savedAt:savedAt||Date.now()};
  }catch(e){ console.error('[LOAD] Error:', e); return null; }
}

    cdLvl:{...S0.cdLvl},atkCdLvl:S0.atkCdLvl,

  for(const k of Object.keys(ulvl)){
    const lvl=ulvl[k];
    for(let i=0;i<lvl;i++){
      const prev={dMin:st.dMin,dMax:st.dMax,mMin:st.mMin,mMax:st.mMax,
        armorPen:st.armorPen,critChance:st.critChance,critDmg:st.critDmg,
        dmgExpMin:st.dmgExpMin,dmgExpMax:st.dmgExpMax,ppMulti:st.ppMulti,
        rMin:{...st.rMin},rMax:{...st.rMax},
        cdLvl:{...st.cdLvl},atkCdLvl:st.atkCdLvl,
        atkTrig:{...st.atkTrig},
        costReduce:{...st.costReduce},
        freeChance:{...st.freeChance},
        luckyResetChance:{...st.luckyResetChance},
      };
      applyUpg(st,prev,k);
    }
  }
  return st;
}

/* ─── APPLY UPGRADE EFFECT (shared BUY / BUY_P) ─────────────────── */
// Returns {res, prestige} refund amounts from held refund consumables
function calcRefund(inv, cost, isPp){
  let totalRefund=0;
  for(const item of inv){
    if(item.type==='consumable'&&item.subtype==='refund'){
      if(Math.random()*100<item.chance){
        totalRefund+=Math.floor(cost*(item.pct/100));
      }
    }
  }
  return totalRefund;
}

function applyUpg(ns,s,k){
  const def=UPG[k];
  if     (def.st==='dMin')     ns.dMin=s.dMin+1;
  else if(def.st==='dMax')     ns.dMax=s.dMax+1;
  else if(def.st==='mMin')     ns.mMin=parseFloat((s.mMin+.05).toFixed(2));
  else if(def.st==='mMax')     ns.mMax=parseFloat((s.mMax+.05).toFixed(2));
  else if(def.st==='armorPen') ns.armorPen=s.armorPen+1;
  else if(def.st==='rMin')     ns.rMin={...s.rMin,[def.r]:s.rMin[def.r]+1};
  else if(def.st==='rMax')     ns.rMax={...s.rMax,[def.r]:s.rMax[def.r]+1};
  else if(def.st==='resCd')    ns.cdLvl={...s.cdLvl,[def.r]:s.cdLvl[def.r]+1};
  else if(def.st==='atkCd')    ns.atkCdLvl=(s.atkCdLvl||0)+1;
  else if(def.st==='critChance') ns.critChance=s.critChance+1;
  else if(def.st==='critDmg')  ns.critDmg=parseFloat((s.critDmg+.1).toFixed(1));
  else if(def.st==='dmgExpMin') ns.dmgExpMin=parseFloat((s.dmgExpMin+.01).toFixed(2));
  else if(def.st==='dmgExpMax') ns.dmgExpMax=parseFloat((s.dmgExpMax+.01).toFixed(2));
  else if(def.st==='ppMulti')  ns.ppMulti=parseFloat((s.ppMulti+.5).toFixed(1));
  else if(def.st==='atkTrig')  ns.atkTrig={...s.atkTrig,[def.r]:(s.atkTrig[def.r]||0)+1};
  else if(def.st==='costReduce')       ns.costReduce={...s.costReduce,[def.r]:(s.costReduce[def.r]||0)+1};
  else if(def.st==='freeChance')       ns.freeChance={...s.freeChance,[def.r]:(s.freeChance[def.r]||0)+1};
  else if(def.st==='luckyResetChance') ns.luckyResetChance={...s.luckyResetChance,[def.r]:(s.luckyResetChance[def.r]||0)+1};
}

/* ─── REDUCER ─────────────────────────────────────────────────────── */
function reduce(s,a){
  switch(a.t){
  case 'TICK':{
    const cd={};
    for(const k of RES){
      const prev=s.cd[k],nxt=Math.max(0,prev-250);
      cd[k]=nxt;
      if(prev>0&&nxt===0) SFX.ready(k);
    }
    return{...s,cd,atkCd:Math.max(0,s.atkCd-250)};
  }

  case 'CLICK':{
    const k=a.k;
    if(s.cd[k]>0||(PREV[k]&&s.tot[PREV[k]]<NEED[k])) return s;
    const mb=computeMods(s.slots,s.slotCount);
    const rMinB=mb.st[k+'Min']||0, rMaxB=mb.st[k+'Max']||0;
    let amt=ri(s.rMin[k]+rMinB, s.rMax[k]+rMaxB);
    const triggered=[];
    // Yield mult procs + echo re-trigger
    for(const p of mb.pr[k]||[]){
      if(Math.random()*100<p.chance){
        triggered.push({slotIdx:p.slotIdx,effect:'mult',res:k,mult:p.mult});
        amt=Math.floor(amt*p.mult);
        for(const ep of mb.echo[k]||[]){
          if(Math.random()*100<ep.chance) amt=Math.floor(amt*p.mult);
        }
      }
    }
    // Chain: free cooldown
    let chained=false;
    for(const cp of mb.chain[k]||[]){
      if(Math.random()*100<cp.chance){chained=true;triggered.push({slotIdx:cp.slotIdx,effect:'chain',res:k,mult:1});break;}
    }
    // Lucky instant cooldown reset
    const lcr=(s.luckyResetChance&&s.luckyResetChance[k])||0;
    const luckyReset=!chained&&lcr>0&&Math.random()*100<lcr;
    // Harvest: bonus yield of all resources
    const harvestRes={};
    for(const hp of mb.harvest[k]||[]){
      if(Math.random()*100<hp.chance){
        for(const r of RES){
          const rMnB=mb.st[r+'Min']||0,rMxB=mb.st[r+'Max']||0;
          harvestRes[r]=(harvestRes[r]||0)+ri(s.rMin[r]+rMnB,s.rMax[r]+rMxB);
        }
        break;
      }
    }
    // Bonk: bonus attack on click
    let bonkDmg=0;
    let bonkSlot=null;
    let bonkLog='';
    if(s.fightHp>0&&(mb.bonk[k]||[]).length){
      for(const bp of mb.bonk[k]||[]){
        if(Math.random()*100<bp.chance){
          const effDMin=Math.max(1,s.dMin+mb.st.dMin);
          const effDMax=Math.max(effDMin,s.dMax+mb.st.dMax);
          const effMMin=parseFloat((s.mMin+mb.st.mMin).toFixed(2));
          const effMMax=parseFloat(Math.max(effMMin+.01,s.mMax+mb.st.mMax).toFixed(2));
          const bd=ri(effDMin,effDMax);
          const bm=rf(effMMin,effMMax);
          const expBase=Math.ceil((Math.pow(bd,s.dmgExpMin+mb.st.dmgExpMin)+Math.pow(bd,s.dmgExpMax+mb.st.dmgExpMax))/2);
          const braw=Math.floor(expBase*bm);
          const en=ENEMIES[s.fightId];
          const effDef=Math.max(0,en.def-s.armorPen);
          bonkDmg=Math.max(0,braw-effDef);
          bonkSlot={slotIdx:bp.slotIdx,effect:'bonk',res:k,mult:1};
          bonkLog=`bonk ${expBase}b ×${bm.toFixed(2)} -${effDef}def →${bonkDmg}`;
          break;
        }
      }
    }
    // Build new state
    const newRes={...s.res,[k]:s.res[k]+amt};
    const newTot={...s.tot,[k]:s.tot[k]+amt};
    const hasHarvest=Object.keys(harvestRes).length>0;
    if(hasHarvest){for(const r of RES){if(harvestRes[r]){newRes[r]+=harvestRes[r];newTot[r]+=harvestRes[r];}}}
    const newFightHp=bonkDmg>0?Math.max(0,s.fightHp-bonkDmg):s.fightHp;
    const logs=[];
    if(bonkDmg>0) logs.push(le(bonkLog,'#f87171','B'));
    if(hasHarvest){
      logs.push(le(`🌾 ${RES.filter(r=>harvestRes[r]).map(r=>`+${harvestRes[r]} ${r}`).join(' ')}`,'#fbbf24','R'));
      triggered.push({slotIdx:-1,effect:'harvest',res:k,mult:1});
    }
    const procTag=triggered.length?' [proc]':chained?' [chain]':luckyReset?' [lucky!]':'';
    logs.push(le(`+${amt} ${k}${procTag}`,COL[k],'R'));
    // SFX — one call per distinct effect type
    const seenEff=new Set();
    for(const tr of triggered){
      if(!seenEff.has(tr.effect)){
        seenEff.add(tr.effect);
        const item=s.slots[tr.slotIdx];
        const q=item?item.q:1;
        SFX.mod(tr.effect,q,tr.res,tr.mult);
      }
    }
    if(luckyReset) SFX.mod('lucky',1,k,1);
    SFX.res(k,amt,s.rMax[k]+rMaxB,triggered.some(t=>t.effect==='mult'),chained||luckyReset,hasHarvest);
    return{...s,
      res:newRes,tot:newTot,fightHp:newFightHp,
      cd:{...s.cd,[k]:(chained||luckyReset)?0:effCd(k,s.cdLvl)},
      lastTriggers:bonkSlot?[...triggered,bonkSlot]:triggered,
      log:[...logs,...s.log].slice(0,80),
    };
  }

  case 'ATK':{
    const en=ENEMIES[s.fightId];
    const mb=computeMods(s.slots,s.slotCount);
    const effDMin=Math.max(1,s.dMin+mb.st.dMin);
    const effDMax=Math.max(effDMin,s.dMax+mb.st.dMax);
    const effMMin=parseFloat((s.mMin+mb.st.mMin).toFixed(2));
    const effMMax=parseFloat(Math.max(effMMin+.01,s.mMax+mb.st.mMax).toFixed(2));
    const base=ri(effDMin,effDMax);
    const mult=rf(effMMin,effMMax);
    // Apply damage exponent
    const expBase=Math.ceil((Math.pow(base,s.dmgExpMin+mb.st.dmgExpMin)+Math.pow(base,s.dmgExpMax+mb.st.dmgExpMax))/2);
    const raw=Math.floor(expBase*mult);
    // Check for crit
    const isCrit=Math.random()*100<(s.critChance+mb.st.critChance);
    const critMult=isCrit?1+(s.critDmg+mb.st.critDmg):1;
    const dmgBeforeDef=Math.floor(raw*critMult);
    const effDef=Math.max(0,en.def-s.armorPen);
    const dmg=Math.max(0,dmgBeforeDef-effDef);
    const newHp=Math.max(0,s.fightHp-dmg);
    const atkEntry=le(`${expBase}b ×${mult.toFixed(2)} ${isCrit?'CRIT!':''} -${effDef}def → ${dmg}`,'#f87171','B');
    const atk=dmg===0?{...atkEntry,zero:true}:atkEntry;

    // Auto-trigger resources on attack
    const trigRes={},trigLogs=[];
    for(const r of RES){
      const ch=s.atkTrig[r];
      if(ch>0&&Math.random()*100<ch){
        const rMnB=mb.st[r+'Min']||0,rMxB=mb.st[r+'Max']||0;
        const amt=ri(s.rMin[r]+rMnB,s.rMax[r]+rMxB);
        trigRes[r]=(trigRes[r]||0)+amt;
        trigLogs.push(le(`⚡+${amt} ${r}`,'#a78bfa','R'));
      }
    }

    const lastAtk={base,mult,effDef,dmg,dMin:effDMin,dMax:effDMax,mMin:effMMin,mMax:effMMax};
    const effAtk=Math.floor(ATK_CD*Math.pow(1.05,-s.atkCdLvl));
    if(dmg===0) SFX.block(); else SFX.hit(dmg,en.maxHp,isCrit,newHp===0);
    if(newHp===0){
      SFX.kill(s.fightId);
      const beaten=[...s.beaten];beaten[s.fightId]=true;
      const beatCount=[...s.beatCount];beatCount[s.fightId]++;
      const lc=ri(en.lMin,en.lMax);
      const drops=Array(lc).fill(0).map(()=>mkDrop(en.lMin,en.lMax,en.maxResIdx,en.lW));
      const space=Math.max(0,s.invMax-s.inv.length);
      const kept=drops.slice(0,space);
      const lost=drops.length-kept.length;
      const lostStr=lost>0?`  (${lost} lost — bag full)`:'`';
      const ppGain=Math.floor(en.pp*(s.ppMulti+mb.st.ppMulti));
      const elapsed=Math.round((Date.now()-s.fightStartTime)/1000);
      const kl=le(`★ E${s.fightId} KILLED  +${ppGain}✦  ${kept.length}/${lc} drop(s)${lostStr}  [${elapsed}s]`,'#fbbf24','B');
      const ps=statsFromUlvl(s.pulvl);
      const psEffAtk=Math.floor(ATK_CD*Math.pow(1.05,-ps.atkCdLvl));
      const runElapsed=Date.now()-s.runStartTime;
      return{...s,beaten,beatCount,fightHp:en.maxHp,
        inv:[...s.inv,...kept],
        prestige:s.prestige+ppGain,
        res:{α:0,β:0,γ:0,δ:0},tot:{...S0.tot},
        // reset resource upgrades; preserve prestige-bought upgrades
        ulvl:{...s.pulvl},
        dMin:ps.dMin,dMax:ps.dMax,mMin:ps.mMin,mMax:ps.mMax,
        armorPen:ps.armorPen,critChance:ps.critChance,critDmg:ps.critDmg,
        dmgExpMin:ps.dmgExpMin,dmgExpMax:ps.dmgExpMax,ppMulti:ps.ppMulti,
        rMin:{...ps.rMin},rMax:{...ps.rMax},
        cdLvl:{...ps.cdLvl},atkCdLvl:ps.atkCdLvl,
        atkTrig:{...ps.atkTrig},
        costReduce:{...ps.costReduce},
        freeChance:{...ps.freeChance},
        luckyResetChance:{...ps.luckyResetChance},
        cd:{α:0,β:0,γ:0,δ:0},atkCd:psEffAtk,lastTriggers:[],lastAtk,
        totalPlayTime:s.totalPlayTime+runElapsed,
        runStartTime:Date.now(),
        runResult:{drops,pp:ppGain,enemyId:s.fightId},
        log:[kl,atk,...s.log].slice(0,80)};
    }
    const newRes={...s.res},newTot={...s.tot};
    for(const r of RES){if(trigRes[r]){newRes[r]+=trigRes[r];newTot[r]+=trigRes[r];}}
    return{...s,res:newRes,tot:newTot,fightHp:newHp,atkCd:effAtk,lastTriggers:[],lastAtk,log:[...trigLogs,atk,...s.log].slice(0,80)};
  }

  case 'SELECT':{
    const{id}=a;
    if(id>0&&!s.beaten[id-1]) return s;
    if(id===s.fightId) return s;
    return{...s,fightId:id,fightHp:ENEMIES[id].maxHp,fightStartTime:Date.now(),
      log:[le(`→ E${id}  ${fmt(ENEMIES[id].maxHp)}HP  def:${ENEMIES[id].def}`,'#555','B'),...s.log].slice(0,80)};
  }

  case 'CLOSE_RUN': return{...s,runResult:null};

  case 'CONCEDE':{
    const mb=computeMods(s.slots,s.slotCount);
    const effAtk=Math.floor(ATK_CD*Math.pow(1.05,-s.atkCdLvl));
    const cl=le(`✗ E${s.fightId} conceded — no rewards`,'#888','B');
    const ps=statsFromUlvl(s.pulvl);
    const psEffAtk=Math.floor(ATK_CD*Math.pow(1.05,-ps.atkCdLvl));
    const runElapsed=Date.now()-s.runStartTime;
    return{...s,fightHp:ENEMIES[s.fightId].maxHp,
      res:{α:0,β:0,γ:0,δ:0},tot:{...S0.tot},
      ulvl:{...s.pulvl},
      dMin:ps.dMin,dMax:ps.dMax,mMin:ps.mMin,mMax:ps.mMax,
      armorPen:ps.armorPen,critChance:ps.critChance,critDmg:ps.critDmg,
      dmgExpMin:ps.dmgExpMin,dmgExpMax:ps.dmgExpMax,ppMulti:ps.ppMulti,
      rMin:{...ps.rMin},rMax:{...ps.rMax},
      cdLvl:{...ps.cdLvl},atkCdLvl:ps.atkCdLvl,
      atkTrig:{...ps.atkTrig},
      costReduce:{...ps.costReduce},
      freeChance:{...ps.freeChance},
      luckyResetChance:{...ps.luckyResetChance},
      cd:{α:0,β:0,γ:0,δ:0},atkCd:psEffAtk,lastTriggers:[],
      totalPlayTime:s.totalPlayTime+runElapsed,
      runStartTime:Date.now(),
      runResult:{drops:[],pp:0,enemyId:s.fightId,concede:true},
      log:[cl,...s.log].slice(0,80)};
  }

  case 'BUY':{
    const def=UPG[a.k],lvl=s.ulvl[a.k];
    if(def.once&&lvl>=1) return s;
    if(def.req&&!s[def.req]) return s;
    const cost=upgCost(a.k,lvl);
    if(s.res[def.res]<cost) return s;
    const refund=calcRefund(s.inv,cost,false);
    let ns={...s,res:{...s.res,[def.res]:s.res[def.res]-cost+refund},ulvl:{...s.ulvl,[a.k]:lvl+1}};
    applyUpg(ns,s,a.k);
    const rfStr=refund>0?`  [+${refund}${def.res} refund]`:'';
    SFX.upgrade(def.res,false,1);
    return{...ns,log:[le(`${def.label}  [-${cost}${def.res}]${rfStr}`,'#6b7280','U'),...ns.log].slice(0,80)};
  }

  case 'BUY_P':{
    const def=UPG[a.k],lvl=s.ulvl[a.k];
    if(def.once&&lvl>=1) return s;
    if(def.req&&!s[def.req]) return s;
    const cost=upgCost(a.k,lvl);
    if(s.prestige<cost) return s;
    let ns={...s,prestige:s.prestige-cost,ulvl:{...s.ulvl,[a.k]:lvl+1},pulvl:{...s.pulvl,[a.k]:(s.pulvl[a.k]||0)+1}};
    applyUpg(ns,s,a.k);
    SFX.upgrade(def.res,true,1);
    return{...ns,log:[le(`${def.label}  [-${cost}✦]`,'#fbbf24','U'),...ns.log].slice(0,80)};
  }

  case 'BUY_N':{
    const limit=a.n==='max'?Infinity:a.n;
    let ns=s,bought=0;
    for(let i=0;i<limit;i++){
      const def=UPG[a.k],lvl=ns.ulvl[a.k];
      if(def.once&&lvl>=1) break;
      if(def.req&&!ns[def.req]) break;
      const baseCost=upgCost(a.k,lvl);
      const cr=(ns.costReduce&&ns.costReduce[def.res])||0;
      const reducedCost=Math.max(1,baseCost-cr);
      if(ns.res[def.res]<reducedCost) break;
      const isFree=(ns.freeChance&&(ns.freeChance[def.res]||0)>0)&&Math.random()*100<ns.freeChance[def.res];
      const cost=isFree?0:reducedCost;
      const refund=isFree?0:calcRefund(ns.inv,cost,false);
      const prev=ns;
      ns={...ns,res:{...ns.res,[def.res]:ns.res[def.res]-cost+refund},ulvl:{...ns.ulvl,[a.k]:lvl+1}};
      applyUpg(ns,prev,a.k);
      bought++;
    }
    if(!bought) return s;
    SFX.upgrade(UPG[a.k].res,false,bought);
    return{...ns,log:[le(`${UPG[a.k].label} ×${bought}`,'#6b7280','U'),...ns.log].slice(0,80)};
  }

  case 'BUY_NP':{
    const limit=a.n==='max'?Infinity:a.n;
    let ns=s,bought=0;
    for(let i=0;i<limit;i++){
      const def=UPG[a.k],lvl=ns.ulvl[a.k];
      if(def.once&&lvl>=1) break;
      if(def.req&&!ns[def.req]) break;
      const cost=upgCost(a.k,lvl);
      if(ns.prestige<cost) break;
      const refund=calcRefund(ns.inv,cost,true);
      const prev=ns;
      ns={...ns,prestige:ns.prestige-cost+refund,ulvl:{...ns.ulvl,[a.k]:lvl+1},pulvl:{...ns.pulvl,[a.k]:(ns.pulvl[a.k]||0)+1}};
      applyUpg(ns,prev,a.k);
      bought++;
    }
    if(!bought) return s;
    SFX.upgrade(UPG[a.k].res,true,bought);
    return{...ns,log:[le(`${UPG[a.k].label} ×${bought}`,'#fbbf24','U'),...ns.log].slice(0,80)};
  }

  case 'BUY_SLOT':{
    const idx=s.slotsDone.findIndex(d=>!d);
    if(idx<0) return s;
    // slot idx 0 = slot 4, requires beating E1; idx 1 = slot 5 requires E2, etc.
    if(!s.beaten[idx+1]) return s;
    const cost=SLOT_COSTS[idx];
    if(s.prestige<cost) return s;
    const sd=[...s.slotsDone];sd[idx]=true;
    return{...s,prestige:s.prestige-cost,slotCount:s.slotCount+1,slotsDone:sd,
      log:[le(`mod slot ${s.slotCount+1} unlocked  [-${cost}✦]`,'#fbbf24','U'),...s.log].slice(0,80)};
  }

  case 'BUY_BAG':{
    const maxBagLvl=(BAG_MAX-BAG_START)/2;
    if(s.bagLvl>=maxBagLvl) return s;
    const cost=bagUpgCost(s.bagLvl);
    if(s.prestige<cost) return s;
    const newMax=s.invMax+2;
    return{...s,prestige:s.prestige-cost,bagLvl:s.bagLvl+1,invMax:newMax,
      log:[le(`bag +2 → ${newMax} slots  [-${cost}✦]`,'#fbbf24','U'),...s.log].slice(0,80)};
  }

  case 'EQUIP':{
    const item=s.inv[a.i];
    if(!item||item.type==='consumable') return s; // can't equip consumables
    const ns=[...s.slots],ni=[...s.inv];
    if(ns[a.s]) ni.push(ns[a.s]);
    ns[a.s]=ni.splice(a.i,1)[0];
    return{...s,slots:ns,inv:ni};
  }
  case 'UNEQUIP':{
    if(!s.slots[a.s]) return s;
    if(s.inv.length>=s.invMax) return s; // bag full
    const ns=[...s.slots],item=ns[a.s];ns[a.s]=null;
    return{...s,slots:ns,inv:[...s.inv,item]};
  }

  case 'SELL':{
    const item=s.inv.find(i=>i.id===a.id);if(!item) return s;
    const ni=s.inv.filter(i=>i.id!==a.id);
    const pp=item.type==='consumable'?1:SELL_PP[item.q-1];
    return{...s,inv:ni,prestige:s.prestige+pp,
      log:[le(`sold ${iLbl(item)}  +${pp}✦`,'#fbbf24','F'),...s.log].slice(0,80)};
  }

  case 'SET_SELL_CONFIRM_Q':{
    return{...s,sellConfirmQ:a.q};
  }

  case 'FORGE':{
    // Item may be in inventory or in an equipment slot
    const slotIdx = s.slots.findIndex(i=>i&&i.id===a.itemId);
    const inSlot = slotIdx >= 0;
    const item = inSlot ? s.slots[slotIdx] : s.inv.find(i=>i.id===a.itemId);
    if (!item) return s;
    // Legendary protect: forge is free
    const free = a.protectQ === 5;
    const cost = free ? 0 : forgeCost(item.upgradeLevel, item.q);
    if (s.prestige < cost) return s;
    // If equipped, temporarily move to inv so doForge can find it
    let baseState = s;
    if (inSlot) {
      const tmpSlots = [...s.slots]; tmpSlots[slotIdx] = null;
      baseState = {...s, slots:tmpSlots, inv:[item, ...s.inv]};
    }
    // Reroll: recalculate base value within quality range, then re-apply levels on top
    let stateForForge = baseState;
    if (a.hasReroll) {
      const def = MOD_DEFS[item.modId];
      const updatedItem = { ...item };
      const isMultMod = item.modId==='mMin'||item.modId==='mMax'||item.modId==='γcrd'||item.modId==='δexm'||item.modId==='δexx'||item.modId==='δppx';
      if (def.type === 'stat') {
        const [sMin,sMax] = QRANGE[item.q - 1];
        const scale = sMin + Math.random() * (sMax - sMin);
        const newBase = isMultMod ? parseFloat((def.base*scale).toFixed(2)) : Math.max(def.base, Math.round(def.base*scale));
        updatedItem.baseValue = newBase;
        updatedItem.value = isMultMod ? parseFloat((newBase + item.upgradeLevel*def.perLvl).toFixed(2)) : newBase + item.upgradeLevel*def.perLvl;
      } else {
        const newBaseChance = Math.min(90, Math.round(def.base + QPROC[item.q-1] + (Math.random()*4-2)));
        updatedItem.baseChance = newBaseChance;
        updatedItem.chance = Math.min(95, newBaseChance + item.upgradeLevel*def.perLvl);
      }
      stateForForge = { ...baseState, inv: baseState.inv.map(i => i.id === item.id ? updatedItem : i) };
    }
    const newState = doForge(stateForForge, a, FORGE_CHANCES, MOD_DEFS, le, iLbl);
    // If item was equipped, restore to slot if it survived, otherwise leave slot empty
    if (inSlot) {
      const survivedItem = newState.inv.find(i=>i.id===a.itemId);
      const restoredSlots = [...newState.slots];
      if (survivedItem) {
        restoredSlots[slotIdx] = survivedItem;
        SFX.forge(true,survivedItem.upgradeLevel,false);
        return {...newState, slots:restoredSlots, inv:newState.inv.filter(i=>i.id!==a.itemId), prestige:newState.prestige-cost};
      }
      SFX.forge(false,item.upgradeLevel,!free&&a.protectQ<item.q);
      return {...newState, slots:restoredSlots, prestige:newState.prestige-cost};
    }
    const forgeSurvivedItem = newState.inv.find(i=>i.id===a.itemId);
    if(forgeSurvivedItem) SFX.forge(true,forgeSurvivedItem.upgradeLevel,false);
    else SFX.forge(false,item.upgradeLevel,!free&&a.protectQ<item.q);
    return { ...newState, prestige: newState.prestige - cost };
  }

  /* ── admin ── */
  case 'ADM_RES':{
    const add=a.k?{[a.k]:99}:{α:99,β:99,γ:99,δ:99};
    const res={},tot={};
    for(const k of RES){res[k]=s.res[k]+(add[k]||0);tot[k]=s.tot[k]+(add[k]||0);}
    return{...s,res,tot,log:[le(`ADM +99 ${a.k||'all'}`,'#4ade80'),...s.log].slice(0,80)};
  }
  case 'ADM_KILL':
    return{...s,fightHp:1,log:[le('ADM boss → 1 HP','#4ade80'),...s.log].slice(0,80)};
  case 'ADM_DROPS':{
    const q=a.q||2;
    const drops=Array(4).fill(0).map(()=>mkDrop(q,q));
    return{...s,inv:[...s.inv,...drops],log:[le(`ADM 4× tier-${QNAME[q-1]} drops`,'#4ade80'),...s.log].slice(0,80)};
  }
  case 'ADM_PRES':
    return{...s,prestige:s.prestige+(a.n||50),log:[le(`ADM +${a.n||50}✦`,'#4ade80'),...s.log].slice(0,80)};
  case 'ADM_UNLOCK':
    return{...s,beaten:ENEMIES.map(()=>true),log:[le('ADM all unlocked','#4ade80'),...s.log].slice(0,80)};
  case 'ADM_CONS':{
    const cons=[
      {id:++_iid,type:'consumable',subtype:'protect',q:4},
      {id:++_iid,type:'consumable',subtype:'luck',q:3},
      {id:++_iid,type:'consumable',subtype:'protect',q:4},
      {id:++_iid,type:'consumable',subtype:'luck',q:2},
    ];
    return{...s,inv:[...s.inv,...cons],log:[le('ADM +4 consumables','#4ade80'),...s.log].slice(0,80)};
  }
  case 'ADM_RESET': return{...S0,log:[le('ADM hard reset','#4ade80')]};
  case 'ADM_HP_PCT':{
    const newHp=Math.max(1,Math.floor(ENEMIES[s.fightId].maxHp*(a.pct/100)));
    return{...s,fightHp:newHp,log:[le(`ADM hp → ${a.pct}%`,'#4ade80'),...s.log].slice(0,80)};
  }

  case 'LOG_DEV':{
    return{...s,log:[le(a.msg||'Developer mode activated','#c084fc'),...s.log].slice(0,80)};
  }

  case 'OFFLINE_DONE':{
    // Account for simulated offline time
    const elapsed=a.elapsed||0;
    return{...s,totalPlayTime:s.totalPlayTime+elapsed};
  }

  default: return s;
  }
}

/* ─── TOOLTIP ─────────────────────────────────────────────────────── */
function modDesc(def){
  const eff=def.effect||'mult';
  if(def.type==='stat'){
    const descs={
      dMin:'raises min damage per attack',      dMax:'raises max damage per attack',
      mMin:'raises min damage multiplier',       mMax:'raises max damage multiplier',
      αMin:'raises α yield floor',              αMax:'raises α yield ceiling',
      βMin:'raises β yield floor',              βMax:'raises β yield ceiling',
      γMin:'raises γ yield floor',              γMax:'raises γ yield ceiling',
      δMin:'raises δ yield floor',              δMax:'raises δ yield ceiling',
      critChance:'increases crit hit chance',   critDmg:'multiplies crit hit damage',
      dmgExpMin:'raises dmg exponent min',      dmgExpMax:'raises dmg exponent max',
      ppMulti:'multiplies prestige points on kill',
    };
    return descs[def.stat]||def.label;
  }
  const r=def.res;
  if(eff==='mult')    return `on ${r} click: multiply ${r} yield ×${def.mult}`;
  if(eff==='chain')   return `on ${r} click: ${r} cooldown not consumed`;
  if(eff==='echo')    return `when a ${r} proc fires: re-apply its mult once`;
  if(eff==='bonk')    return `on ${r} click: fire a free bonus attack`;
  if(eff==='harvest') return `on ${r} click: instantly yield all resources`;
  return def.label;
}
function Tooltip({tip}){
  if(!tip) return null;
  const{item,x,y}=tip;
  const W=260,H=200;
  const tx=x+16+W>window.innerWidth?x-W-8:x+16;
  const ty=Math.min(Math.max(y-10,6),window.innerHeight-H-8);
  const c=item.type==='consumable'?(item.q?QCOL[item.q-1]:'#60a5fa'):QCOL[item.q-1];
  const ROW=(k,v)=>(
    <div style={{display:'flex',justifyContent:'space-between',gap:'12px'}}>
      <span style={{color:'#888',flexShrink:0}}>{k}</span>
      <span style={{color:'#fff',textAlign:'right'}}>{v}</span>
    </div>
  );
  return(
    <div style={{position:'fixed',left:tx,top:ty,zIndex:999,pointerEvents:'none',
      background:'#1c1c1c',border:`1px solid ${c}`,borderRadius:'5px',
      padding:'12px 16px',fontFamily:'monospace',fontSize:'14px',
      color:'#eee',width:W,lineHeight:1.9}}>
      {item.type==='consumable'?(
        <>
          <div style={{color:c,fontSize:'13px',letterSpacing:'1.5px',marginBottom:'4px',fontFamily:"'PT Mono', monospace"}}>CONSUMABLE</div>
          <div style={{marginBottom:'6px'}}>{getConsumableDescription(item)}</div>
          <div style={{color:'#bbb',fontSize:'13px',borderTop:'1px solid #252525',paddingTop:'4px'}}>
            use in forge · sell 1✦
          </div>
        </>
      ):(
        (()=>{
          const def=MOD_DEFS[item.modId];
          const eff=def.effect||'mult';
          return(
            <>
              <div style={{marginBottom:'6px',display:'flex',alignItems:'baseline',gap:'6px'}}>
                <span style={{color:c,fontWeight:'bold'}}>{QFULL[item.q-1]}</span>
                <span style={{color:`${c}99`,fontSize:'12px',letterSpacing:'1.5px'}}>{QNAME[item.q-1]}</span>
                {item.upgradeLevel>0&&<span style={{color:`${c}cc`,fontSize:'13px',marginLeft:'2px'}}>+{item.upgradeLevel}</span>}
              </div>
              {def.type==='stat'?(
                <>
                  {ROW('type','passive')}
                  {ROW('value', def.float?`+${item.value.toFixed(2)}`:`+${item.value}`)}
                  {ROW('per lvl', def.float?`+${def.perLvl.toFixed(2)}`:`+${def.perLvl}`)}
                  <div style={{color:'#aaa',fontSize:'13px',marginTop:'4px',fontStyle:'italic'}}>{modDesc(def)}</div>
                </>
              ):(
                <>
                  {ROW('type','proc')}
                  {ROW('chance',`${item.chance}%`)}
                  {eff==='mult'&&ROW('mult',`×${def.mult}`)}
                  {ROW('per lvl',`+${def.perLvl}%`)}
                  <div style={{color:'#aaa',fontSize:'13px',marginTop:'4px',fontStyle:'italic'}}>{modDesc(def)}</div>
                </>
              )}
              <div style={{color:'#fbbf2499',fontSize:'13px',marginTop:'5px',
                borderTop:'1px solid #252525',paddingTop:'4px'}}>
                sell {SELL_PP[item.q-1]}✦ · equip to activate
              </div>
            </>
          );
        })()
      )}
    </div>
  );
}
