  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;touch-action:manipulation}
  body{background:#1b1b1b;font-family:'IBM Plex Mono Nums','Atkinson Hyperlegible',sans-serif;user-select:none}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#303030}
  ::-webkit-scrollbar-thumb{background:#686868;border-radius:2px}
  @keyframes modflash{
    0%  {opacity:0.4;outline:2px solid #fbbf24}
    40% {opacity:0.8;outline:2px solid #fbbf2488}
    100%{opacity:1;outline:2px solid transparent}
  }
  .mod-flash{animation:modflash 700ms ease-out;will-change:opacity}
  @keyframes readypulse{0%,100%{opacity:1}50%{opacity:.5}}
  .res-ready{animation:readypulse 2.2s ease-in-out infinite;will-change:opacity}
  @keyframes floatnum{
    0%  {opacity:1;transform:translateY(0)}
    20% {opacity:1;transform:translateY(calc(var(--fs,1) * -35px))}
    38% {opacity:1;transform:translateY(calc(var(--fs,1) * -46px))}
    55% {opacity:1;transform:translateY(calc(var(--fs,1) * -37px))}
    70% {opacity:1;transform:translateY(calc(var(--fs,1) * -15px))}
    82% {opacity:0.7;transform:translateY(calc(var(--fs,1) * 10px))}
    100%{opacity:0;transform:translateY(calc(var(--fs,1) * 72px))}
  }
  @keyframes floatshield{
    0%  {opacity:0.9;transform:translateY(0)}
    30% {opacity:0.9;transform:translateY(-22px)}
    60% {opacity:0.7;transform:translateY(-28px)}
    100%{opacity:0;transform:translateY(-40px)}
  }
  .float-num{position:absolute;pointer-events:none;z-index:100;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:28px;user-select:none;white-space:nowrap;will-change:transform,opacity;text-shadow:0 0 3px #000,0 1px 3px #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000}
  .float-num-arcC,.float-num-arcL,.float-num-arcR{animation:floatnum 3.2s linear forwards}
  .float-num-shield{animation:floatshield 1.8s ease-out forwards}
  .float-num-crit{font-size:40px!important}
  @keyframes critshake{
    0%,100%{transform:translateX(0) scale(1)}
    15%    {transform:translateX(-5px) scale(1.12) rotate(-2deg)}
    35%    {transform:translateX(5px) scale(1.16) rotate(2deg)}
    55%    {transform:translateX(-3px) scale(1.08) rotate(-1deg)}
    75%    {transform:translateX(3px) scale(1.04)}
  }
  .crit-shake{display:inline-block;animation:critshake 450ms ease-out;will-change:transform}
  @keyframes forgesuccess{
    0%  {outline:2px solid #4ade80;box-shadow:0 0 12px #4ade8044}
    60% {outline:2px solid #4ade8066;box-shadow:0 0 6px #4ade8022}
    100%{outline:2px solid transparent;box-shadow:none}
  }
  @keyframes forgefail{
    0%  {outline:2px solid #f87171;transform:translateX(0)}
    20% {outline:2px solid #f87171cc;transform:translateX(-10px)}
    40% {outline:2px solid #f87171aa;transform:translateX(10px)}
    60% {outline:2px solid #f8717188;transform:translateX(-6px)}
    80% {outline:2px solid #f8717144;transform:translateX(6px)}
    100%{outline:2px solid transparent;transform:translateX(0)}
  }
  .forge-success{animation:forgesuccess 700ms ease-out;will-change:outline,box-shadow}
  .forge-fail   {animation:forgefail 500ms ease-out;will-change:transform,outline}
  @keyframes forgehit1{
    0%  {outline:2px solid #60a5fa;opacity:0.5;background:#60a5fa0a}
    40% {outline:2px solid #60a5fa88;opacity:1}
    100%{outline:none;opacity:1}
  }
  @keyframes forgehit2{
    0%  {outline:2px solid #c084fc;opacity:0.5;background:#c084fc0f}
    40% {outline:2px solid #c084fc88;opacity:1}
    100%{outline:none;opacity:1}
  }
  @keyframes forgehit3{
    0%  {outline:3px solid #f59e0b;opacity:0.5;background:#f59e0b12;transform:scale(1.005)}
    40% {outline:3px solid #f59e0b99;opacity:1;transform:scale(1.005)}
    100%{outline:none;opacity:1;transform:scale(1)}
  }
  .forge-hit-1{animation:forgehit1 550ms ease-out;will-change:opacity}
  .forge-hit-2{animation:forgehit2 550ms ease-out;will-change:opacity}
  .forge-hit-3{animation:forgehit3 600ms ease-out;will-change:opacity,transform}
  @keyframes forgerollfade{
    0%  {opacity:1}
    100%{opacity:0}
  }
  .forge-roll-fade{animation:forgerollfade 1400ms ease-out forwards;will-change:opacity}
  @keyframes forgewiggle{
    0%,100%{outline:2px solid #fbbf24cc;outline-offset:1px}
    50%    {outline:2px solid #fbbf2444;outline-offset:0px}
  }
  .forge-wiggle{animation:forgewiggle 1400ms ease-in-out infinite;will-change:outline}
  @keyframes legendpulse{
    0%,100%{opacity:0.8}
    50%    {opacity:1}
  }
  .item-legendary{animation:legendpulse 2.8s ease-in-out infinite;will-change:opacity}
  input[type="range"]{-webkit-appearance:none;appearance:none;background:transparent;padding:0;border:0;outline:none}
  input[type="range"]::-webkit-slider-runnable-track{background:#747474;height:4px;border-radius:2px}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:6px;background:#f87171;cursor:pointer;box-shadow:0 0 4px rgba(248,113,113,0.5)}
  input[type="range"]::-moz-range-track{background:#747474;height:4px;border-radius:2px;border:0}
  input[type="range"]::-moz-range-thumb{width:12px;height:12px;border-radius:6px;background:#f87171;cursor:pointer;border:0;box-shadow:0 0 4px rgba(248,113,113,0.5)}
  @keyframes autoSaveLedFlash{
    0%  {opacity:0;box-shadow:0 0 0 rgba(74,222,128,0)}
    15% {opacity:1;box-shadow:0 0 10px 3px rgba(74,222,128,0.9)}
    50% {opacity:0.8;box-shadow:0 0 6px 2px rgba(74,222,128,0.6)}
    100%{opacity:0;box-shadow:0 0 0 rgba(74,222,128,0)}
  }
  .autosave-led{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:autoSaveLedFlash 1800ms ease-in-out forwards;pointer-events:none;display:block}
  @keyframes savePendingPulse{
    0%,100%{opacity:0.35;box-shadow:0 0 3px rgba(74,222,128,0.3)}
    50%    {opacity:0.9;box-shadow:0 0 8px 2px rgba(74,222,128,0.7)}
  }
  .save-pending{width:10px;height:10px;border-radius:50%;background:#4ade80;animation:savePendingPulse 1.5s ease-in-out infinite;pointer-events:none;display:block}
  @keyframes logSlideIn{
    0%  {opacity:0;transform:translateX(-8px)}
    100%{opacity:1;transform:translateX(0)}
  }
  .log-entry{animation:logSlideIn 300ms ease-out;will-change:transform,opacity;user-select:text}
  .log-entry:hover{filter:brightness(1.25);cursor:default}
  textarea,input[type="text"],input[type="number"]{user-select:text}
  .upg-row:hover > span{color:#eee !important}
  @keyframes btnPress{
    0%   {transform:scale(1)}
    50%  {transform:scale(0.96)}
    100% {transform:scale(1)}
  }
  button:active:not(.res-btn){animation:btnPress 120ms ease-out;transform-origin:center}
  @keyframes tutUnlock{
    0%  {box-shadow:0 0 0 0 rgba(251,191,36,0.7);transform:scale(1)}
    40% {box-shadow:0 0 0 6px rgba(251,191,36,0);transform:scale(1.03)}
    100%{box-shadow:0 0 0 0 rgba(251,191,36,0);transform:scale(1)}
  }
  .tut-unlock{animation:tutUnlock 500ms ease-out;}
  @keyframes tut-pulse{
    0%,100%{box-shadow:0 0 0 3px rgba(251,191,36,0.55), 0 0 10px rgba(251,191,36,0.4)}
    50%    {box-shadow:0 0 0 3px rgba(251,191,36,0.75),  0 0 15px rgba(251,191,36,0.6)}
  }
  .tut-highlight{
    box-shadow:0 0 0 3px rgba(251,191,36,0.55), 0 0 10px rgba(251,191,36,0.4);
    animation:tut-pulse 2s ease-in-out infinite;
    position:relative;
    z-index:101;
  }
  @keyframes resJuice{
    0%   {transform:scale(1)}
    40%  {transform:scale(0.97)}
    100% {transform:scale(1)}
  }
  @keyframes barShrink{
    0%   {transform:scaleX(1) scaleY(1)}
    40%  {transform:scaleX(0.98) scaleY(0.94)}
    100% {transform:scaleX(1) scaleY(1)}
  }
  .juice{animation:resJuice 150ms ease-out;transform-origin:center}
  .juice > div{animation:barShrink 150ms ease-out;transform-origin:center}
  @keyframes resJuiceWeak{
    0%   {transform:scale(1)}
    40%  {transform:scale(0.988)}
    100% {transform:scale(1)}
  }
  .juice-weak{animation:resJuiceWeak 160ms cubic-bezier(0.34,1.56,0.64,1);transform-origin:center}
  @keyframes resReject{
    0%,100%{transform:translateX(0)}
    20%    {transform:translateX(-3px)}
    40%    {transform:translateX(3px)}
    60%    {transform:translateX(-2px)}
    80%    {transform:translateX(1px)}
  }
  .res-reject{animation:resReject 350ms ease-out;will-change:transform}
  @keyframes resRejectWeak{
    0%,100%{transform:translateX(0)}
    25%    {transform:translateX(-1px)}
    50%    {transform:translateX(1px)}
    75%    {transform:translateX(-0.5px)}
  }
  .res-reject-weak{animation:resRejectWeak 250ms ease-out;will-change:transform}
  @keyframes pipeFade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
  .res-pipe{animation:pipeFade 2000ms ease-in forwards;pointer-events:none;position:fixed;width:3px;transform:translateX(-50%);}
  @keyframes atkSlide{
    0%   {transform:translateY(0) scaleX(1)}
    60%  {transform:translateY(-8px) scaleX(0.98)}
    100% {transform:translateY(0) scaleX(1)}
  }
  .atk-slide{animation:atkSlide 180ms ease-out}
  @keyframes wimpyWiggle{
    0%,100%{transform:rotate(0deg)}
    10%{transform:rotate(-1.5deg)}
    30%{transform:rotate(1.5deg)}
    50%{transform:rotate(-1deg)}
    70%{transform:rotate(1deg)}
  }
  .atk-wiggle{animation:wimpyWiggle 240ms ease-in-out}
  @keyframes hpJuice{
    0%   {background:#282828;transform:scaleY(1.15) scaleX(0.95)}
    50%  {background:#1b1b1b;transform:scaleY(1.08) scaleX(0.98)}
    100% {background:#2c2c2c;transform:scaleY(1) scaleX(1)}
  }
  .hp-juice{animation:hpJuice 200ms cubic-bezier(0.34,1.56,0.64,1);transform-origin:center}
  @keyframes hpHitFlash{
    0%  {opacity:0.45}
    100%{opacity:0}
  }
