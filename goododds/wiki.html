<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>goododds wiki</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1b1b1b;color:#e5e5e5;font-family:'IBM Plex Mono',monospace;font-size:13px;min-height:100vh}
#topbar{position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:6px;padding:0 18px;height:41px;background:#111;border-bottom:1px solid #222;flex-shrink:0}
#topbar h1{font-size:11px;letter-spacing:2px;color:#888;font-weight:600;white-space:nowrap;margin-right:6px}
.tab-btn{background:none;border:1px solid transparent;color:#666;padding:3px 9px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;letter-spacing:1px;white-space:nowrap;transition:color .12s;flex-shrink:0}
.tab-btn:hover{color:#aaa;background:#141414}
.tab-btn.active{color:#e5e5e5;background:#1e1e1e;border-color:#2a2a2a}
.tsep{width:1px;height:16px;background:#222;margin:0 3px;flex-shrink:0}
.spacer{flex:1}
#gsearch{background:#141414;border:1px solid #2a2a2a;color:#ddd;padding:4px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:150px}
#gsearch:focus{outline:none;border-color:#444}
.layout{display:grid;grid-template-columns:1fr 370px;height:calc(100vh - 41px);gap:8px;padding:8px;background:#1b1b1b}
.main{overflow-y:auto;overflow-x:auto;display:flex;flex-direction:column;background:#181818;border:2px solid #383838;border-radius:6px}
.sidebar{background:#181818;border:2px solid #383838;border-radius:6px;height:100%;display:flex;flex-direction:column;overflow:hidden}
.fbr{display:flex;gap:5px;align-items:center;flex-wrap:wrap;padding:7px 18px;background:#181818;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.fbr input{background:#141414;border:1px solid #2a2a2a;color:#ddd;padding:4px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:130px}
.fbr input:focus{outline:none;border-color:#444}
.fbtn{background:#141414;border:1px solid #2a2a2a;color:#777;padding:2px 7px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;transition:all .1s}
.fbtn.active{border-color:var(--ac,#E868F1);color:var(--ac,#E868F1)}
.fsep{color:#444;font-size:12px;user-select:none}
.sec-hd{font-size:10px;letter-spacing:2px;color:#777;padding:10px 18px 8px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.tbl-wrap{padding:0 18px 24px;overflow-x:auto}
table.wtbl{width:100%;border-collapse:collapse}
table.wtbl th{color:#666;font-weight:normal;font-size:10px;letter-spacing:1.5px;padding:5px 8px;border-bottom:1px solid #222;text-align:left;cursor:pointer;user-select:none;white-space:nowrap;background:#181818}
table.wtbl th:hover{color:#999}
table.wtbl th::after{content:' ↑';color:transparent}
table.wtbl th.sa::after{content:' ↑';color:#E868F1}
table.wtbl th.sd::after{content:' ↓';color:#E868F1}
table.wtbl td{padding:5px 8px;border-bottom:1px solid #161616;vertical-align:middle;font-size:12px;white-space:nowrap}
table.wtbl tr:hover td{background:#111}
table.wtbl tr.sel td{background:#1a0d2a}
.ra{color:#60a5fa}.rb{color:#4ade80}.rg{color:#fcd34d}.rd{color:#c084fc}
.qc{color:#9ca3af}.qu{color:#4ade80}.qr{color:#60a5fa}.qe{color:#c084fc}.ql{color:#f59e0b}
.ec0{color:#9ca3af}.ec1{color:#60a5fa}.ec2{color:#4ade80}.ec3{color:#fcd34d}.ec4{color:#f97316}.ec5{color:#f43f5e}.ec6{color:#c084fc}.ec7{color:#a78bfa}
.tag-s{font-size:10px;letter-spacing:1px;color:#60a5fa}
.tag-p{font-size:10px;letter-spacing:1px;color:#f59e0b}
.dim{color:#4d4d4d}
.muted{color:#777}
#sb-title{padding:9px 14px;font-size:11px;letter-spacing:1px;color:#666;border-bottom:1px solid #1e1e1e;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#sb-empty{padding:24px 14px;color:#666;font-size:12px;text-align:center;line-height:1.8;flex-shrink:0}
#sb-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
.sb-modes{display:flex;gap:5px;padding:7px 14px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.lvl-btn{background:#141414;border:1px solid #2a2a2a;color:#777;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;flex:1;transition:all .12s}
.lvl-btn.active{color:#c084fc;border-color:#c084fc44;background:#1a0d2a}
.level-btn{background:#141414;border:1px solid #2a2a2a;color:#888;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;flex:1;transition:all .15s}
.level-btn.active{border-color:#4ade8044;color:#4ade80;background:#0a1f0a}
.sb-info{padding:6px 14px;font-size:10px;color:#777;border-bottom:1px solid #1a1a1a;flex-shrink:0;line-height:1.6}
.sb-scroll{overflow-y:auto;flex:1;padding:0 14px 0}
table.ct{width:100%;border-collapse:collapse;font-size:12px}
table.ct th{color:#666;font-weight:normal;font-size:10px;letter-spacing:1px;padding:4px 6px;border-bottom:1px solid #222;position:sticky;top:0;background:#181818}
table.ct td{padding:3px 6px;border-bottom:1px solid #1a1a1a;color:#ccc}
table.ct tr:hover td{background:#161616}
table.ct tr.ev td{background:#181818}
.sb-footer{padding:5px 14px;font-size:10px;color:#555;border-top:1px solid #1a1a1a;flex-shrink:0}
table.mvt{width:100%;border-collapse:collapse;font-size:12px}
table.mvt th{color:#777;font-weight:normal;font-size:10px;letter-spacing:1px;padding:3px 6px;border-bottom:1px solid #222;position:sticky;top:0;background:#181818;z-index:50}
table.mvt td{padding:3px 6px;border-bottom:1px solid #161616}
table.mvt tr:hover td{background:#161616}
table.mvt tr.ev td{background:#181818}
.sidebar-section{padding:8px 14px;border-top:1px solid #1a1a1a;flex-shrink:0}
.q-section{padding:14px 18px 24px;overflow-x:auto}
table.qtbl{border-collapse:collapse;font-size:12px;margin-bottom:20px;width:100%}
table.qtbl th{color:#666;font-weight:normal;font-size:10px;letter-spacing:1.5px;padding:5px 8px;border-bottom:1px solid #222;text-align:center}
table.qtbl th.lh{text-align:left;color:#666}
table.qtbl td{padding:5px 8px;border-bottom:1px solid #1a1a1a;text-align:center;color:#bbb;font-size:12px}
table.qtbl td.lc{text-align:left;color:#666;font-size:10px;letter-spacing:1px;white-space:nowrap}
.loot-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;min-width:70px}
.ls{height:100%}
.e-bar-row{margin:5px 0}
.e-bar-track{height:4px;background:#1e1e1e;border-radius:2px;margin-top:2px}
.e-bar-fill{height:100%;border-radius:2px}
.sec-hint{color:#666;letter-spacing:0;font-size:10px}
.sec-note{color:#555;font-size:11px}
#mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;height:48px;background:#0d0d0d;border-top:1px solid #1e1e1e;z-index:150}
.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;border-top:2px solid transparent;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:#666;cursor:pointer;padding:6px 0;transition:all .1s}
.mob-tab .mob-icon{font-size:16px;line-height:1}
.mob-tab.active{background:#141414;color:#e5e5e5;font-weight:bold;border-top-color:#888}
@media(max-width:767px){
  #mob-bar{display:flex}
  .layout{height:calc(100vh - 41px - 48px);grid-template-columns:1fr}
  .layout.has-cmp{grid-template-columns:1fr}
  .sidebar{height:100%;width:100%}
  #topbar{overflow-x:auto;-webkit-overflow-scrolling:touch;gap:3px;padding:0 8px}
  #gsearch{width:100px}
  .tab-btn{font-size:10px;padding:2px 6px}
}
tr.sdim td{opacity:0.18;transition:opacity .1s}
.search{background:#141414;border:1px solid #2a2a2a;color:#ddd;padding:4px 8px;border-radius:4px;font-family:inherit;font-size:12px;width:120px}
.search:focus{outline:none;border-color:#444}
.sec-hdr-bar{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:7px 18px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.sec-hd-inline{font-size:10px;letter-spacing:2px;color:#777;margin-right:auto;white-space:nowrap}
.sec-hdr-right{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.layout.has-cmp{grid-template-columns:1fr 370px 370px}
#sidebar-cmp{display:none;background:#181818;border:2px solid #1e3838;border-radius:6px;height:100%;flex-direction:column;overflow:hidden}
#cmp-title-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #1e1e1e;flex-shrink:0;gap:6px;min-width:0}
#cmp-tag{font-size:9px;letter-spacing:1px;color:#2a9e9e;flex-shrink:0}
#cmp-title{flex:1;font-size:11px;letter-spacing:1px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
#cmp-close{background:none;border:none;color:#444;cursor:pointer;font-size:16px;padding:0 2px;font-family:inherit;line-height:1;flex-shrink:0;transition:color .1s}
#cmp-close:hover{color:#aaa}
#cmp-empty{padding:24px 14px;color:#555;font-size:12px;text-align:center;line-height:2;flex-shrink:0}
#cmp-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
table.wtbl tr.cmp-sel td{background:#091f1f}
@media(max-width:767px){.layout.has-cmp{grid-template-columns:1fr}#sidebar-cmp{height:100%;width:100%}}
</style>
</head>
<body>

<div id="topbar">
  <h1>goododds wiki</h1>
  <div class="tsep"></div>
  <button class="tab-btn active" id="tab-upgrades" onclick="switchTab('upgrades')">UPGRADES</button>
  <button class="tab-btn" id="tab-enemies" onclick="switchTab('enemies')">ENEMIES</button>
  <button class="tab-btn" id="tab-mods" onclick="switchTab('mods')">MODS</button>
  <button class="tab-btn" id="tab-quality" onclick="switchTab('quality')">QUALITY</button>
  <button class="tab-btn" id="tab-loot" onclick="switchTab('loot')">LOOT</button>
  <div class="spacer"></div>
  <input id="gsearch" placeholder="search…" oninput="onSearch()">
</div>

<div class="layout" id="layout">
  <div class="main" id="main-content"></div>
  <div class="sidebar" id="sidebar">
    <div id="sb-title">SELECT A ROW</div>
    <div id="sb-empty">click any row<br>for details</div>
    <div id="sb-body"></div>
  </div>
  <div id="sidebar-cmp">
    <div id="cmp-title-row">
      <span id="cmp-tag">CMP</span>
      <div id="cmp-title">SELECT TO COMPARE</div>
      <button id="cmp-close" onclick="closeCmp()" title="close compare">✕</button>
    </div>
    <div id="cmp-empty">right-click any row<br>to compare<br><span style="font-size:10px;color:#3a3a3a">long-press on mobile</span></div>
    <div id="cmp-body"></div>
  </div>
</div>

<div id="mob-bar">
  <button class="mob-tab active" id="mobt-table" onclick="setMobView('table')">
    <span class="mob-icon">≡</span><span>TABLE</span>
  </button>
  <button class="mob-tab" id="mobt-detail" onclick="setMobView('detail')">
    <span class="mob-icon">◈</span><span>DETAIL</span>
  </button>
  <button class="mob-tab" id="mobt-compare" onclick="setMobView('compare')" style="display:none">
    <span class="mob-icon">⇌</span><span>COMPARE</span>
  </button>
</div>

// ─── HELPERS ──────────────────────────────────────────────────────────────────────────

function fmtN(n) {
  n = Math.floor(n);
  if (n < 1000) return String(n);
  if (n < 1000000) return (n/1000).toFixed(1).replace(/\.0$/,'')+'k';
  if (n < 1000000000) return (n/1000000).toFixed(2)+'M';
  return (n/1000000000).toFixed(2)+'B';
}
function upgCost(k, lv)   { const u=UPG[k]; return Math.max(1,Math.floor(u.base*Math.pow(u.scale||DEFAULT_SCALE,lv))); }
function presCost(k, lv)  { const u=UPG[k]; return Math.max(1,Math.floor((u.presBase||u.base)*Math.pow(u.presScale||u.scale||DEFAULT_SCALE,lv))); }
function permCostFn(k,lv) { const u=UPG[k]; return Math.floor((u.permBase||u.base)*4*Math.pow(u.permScale||(u.scale||DEFAULT_SCALE)+0.05,lv)); }
function forgeCostFn(lv,q){ return Math.max(1,Math.floor(FORGE_BASE_COSTS[q-1]*Math.pow(FORGE_SCALE_BY_Q[q-1],lv))); }
function bagCostFn(lv)    { return Math.floor(BAG_BASE_COST*Math.pow(2,lv)); }
function hasPerm(k)       { return 'res' in UPG[k] && !!PERM_RES_UNLOCK[UPG[k].res]; }

// ─── STATE ────────────────────────────────────────────────────────────────────────────────

let activeTab = 'upgrades';
let selKey = null;
let selTab = null;

function pushHash() {
  const parts = [activeTab];
  if (selKey !== null) parts.push(selKey);
  const h = '#' + parts.join('/');
  if (location.hash !== h) history.replaceState(null, '', h);
}

function applyHash() {
  const raw = location.hash.replace(/^#/, '');
  if (!raw) return;
  const [tab, key] = raw.split('/');
  const validTabs = ['upgrades','enemies','mods','quality','loot'];
  if (!validTabs.includes(tab)) return;
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + tab);
  if (tabEl) tabEl.classList.add('active');
  if (key !== undefined) {
    const decoded = decodeURIComponent(key);
    const parsed = (tab === 'enemies' || tab === 'loot') ? Number(decoded) : decoded;
    selKey = parsed;
    selTab = tab;
  }
}
let gSearch = '';

  upgrades: { sc:'res', sd:1, fr:'', fs:'', sel:null, search:'', sbMode:'reg', localSearch:'' },
  enemies:  { sel:null, search:'' },

  quality:  { sel:null, search:'' },

};

let cmpTab = null;
let cmpSbMode = 'reg';

function switchTab(tab) {
  if (tab !== activeTab && cmpKey !== null) closeCmp();
  // Save current tab state
  const cur = ST[activeTab];
  if (cur) { cur.sel = selKey; cur.search = gSearch; }

  activeTab = tab;

  // Restore new tab state
  const ns = ST[tab] || {};
  selKey = ns.sel !== undefined ? ns.sel : null;
  selTab = selKey !== null ? tab : null;
  gSearch = ns.search || '';
  document.getElementById('gsearch').value = gSearch;
  if (tab === 'upgrades' && ns.sbMode) sbMode = ns.sbMode;
  if (tab === 'mods') { wikiChartQ = ns.chartQ || 3; }

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  pushHash();
  renderMain(); renderSB();
}
function onSearch() {
  gSearch = document.getElementById('gsearch').value.toLowerCase();
  if (ST[activeTab]) ST[activeTab].search = gSearch;
  renderMain();
}
function onLocalSearch(el) {
  const s = ST[activeTab];
  if (s) s.localSearch = el.value.toLowerCase();
  renderMain();
}
function renderMain() {
  const mc = document.getElementById('main-content');
  if      (activeTab==='upgrades') mc.innerHTML = buildUpgradesHTML();
  else if (activeTab==='enemies')  mc.innerHTML = buildEnemiesHTML();
  else if (activeTab==='mods')     mc.innerHTML = buildModsHTML();
  else if (activeTab==='quality')  mc.innerHTML = buildQualityHTML();
  else if (activeTab==='loot')     mc.innerHTML = buildLootHTML();
}

const ATK_STATS = ['atkTrig','atkCd'];
const DMG_STATS = ['dMin','dMax','mMin','mMax','armorPierce','dmgExpMin','dmgExpMax','critChance','critDmg','ppMulti'];

function buildUpgradesHTML() {
  const s = ST.upgrades;
  const sc = col => s.sc===col ? (s.sd>0?' class="sa"':' class="sd"') : '';
  let data = Object.keys(UPG).map(k => {
    const u = UPG[k];
    const pu = hasPerm(k) ? PERM_RES_UNLOCK[u.res] : '';
    return { key:k, st:u.st||'', label:u.label||'', res:u.res||'',
      base:u.base||0, scale:u.scale||DEFAULT_SCALE,
      presBase:u.presBase||'', presScale:u.presScale||'',
      permBase:u.permBase||'', permScale:u.permScale||'',
      unlock: u.unlock!==undefined ? u.unlock : '',
      permUnlock: pu };
  });
  if (s.fr) data = data.filter(r => r.res===s.fr);
  if (s.fs==='atk') data = data.filter(r => ATK_STATS.some(x => r.st.includes(x)));
  else if (s.fs==='dmg') data = data.filter(r => DMG_STATS.some(x => r.st.includes(x)));
  const ls = (s.localSearch||'').toLowerCase();
  if (ls) data = data.filter(r =>
    r.key.toLowerCase().includes(ls)||r.label.toLowerCase().includes(ls)||r.st.toLowerCase().includes(ls));
  data.sort((a,b)=>{
    if(s.sc===null) return 0;
    let av=a[s.sc],bv=b[s.sc];
    if(av===''||av===undefined) av=-Infinity;
    if(bv===''||bv===undefined) bv=-Infinity;
    if(typeof av==='string') return av.localeCompare(bv)*s.sd;
    return (av-bv)*s.sd;
  });

  const rows = data.map(r => {
    const col = RES_COL[r.res]||'#888';
    const u = UPG[r.key];
    const presB = r.presBase !== '' ? r.presBase : `<span class="dim">${r.base}</span>`;
    const presS = r.presScale !== '' ? r.presScale : `<span class="dim">${r.scale}</span>`;
    const permB = r.permBase !== '' ? r.permBase
      : (r.permUnlock !== '' ? `<span class="dim">${+(r.base*4).toFixed(1)}</span>` : '<span class="dim">—</span>');
    const permS = r.permScale !== '' ? r.permScale
      : (r.permUnlock !== '' ? `<span class="dim">${+((r.scale||DEFAULT_SCALE)+0.05).toFixed(2)}</span>` : '<span class="dim">—</span>');
    const unlk = r.unlock !== '' ? `<span class="muted" style="font-size:11px">E${r.unlock}</span>` : '<span class="dim">—</span>';
    const pumk = r.permUnlock !== '' ? `<span style="color:#a78bfa;font-size:11px">E${r.permUnlock}</span>` : '<span class="dim">—</span>';
    const sel  = (selTab==='upgrades'&&selKey===r.key)?' sel':'';
    const dim  = gSearch && !(r.key.toLowerCase().includes(gSearch)||r.label.toLowerCase().includes(gSearch)||r.st.toLowerCase().includes(gSearch)) ? ' sdim' : '';
    const cmpSel = (cmpTab==='upgrades'&&cmpKey===r.key)?' cmp-sel':'';
    return `<tr class="${sel}${dim}${cmpSel}" onclick="selUpg('${r.key}')" data-cmpkey="${r.key}" data-cmptab="upgrades">
      <td style="color:#ccc">${r.label}</td>
      <td><span style="color:${col}">${r.res||'—'}</span></td>
      <td style="color:#aaa">${r.base}</td>
      <td style="color:#777">${r.scale}</td>
      <td>${presB}</td><td>${presS}</td>
      <td>${permB}</td><td>${permS}</td>
      <td>${unlk}</td><td>${pumk}</td>
    </tr>`;
  }).join('');

  const resBtns = ['','α','β','γ','δ'].map(r => {
    const ac = s.fr===r?' active':''; const col = r?(RES_COL[r]):'#888'; const bc = r?(RES_COL[r]+'44'):'#383838';
    return `<button class="fbtn${ac}" style="color:${col};border-color:${bc};--ac:${col}" onclick="setUF('fr','${r}')">${r||'ALL'}</button>`;
  }).join('');
  const stBtns = [['','ALL','#888','#383838'],['atk','ATK','#f97316','#f9731644'],['dmg','DMG','#f43f5e','#f43f5e44']].map(([v,t,c,b])=>{
    const ac = s.fs===v?' active':'';
    return `<button class="fbtn${ac}" style="color:${c};border-color:${b};--ac:${c}" onclick="setUF('fs','${v}')">${t}</button>`;
  }).join('');

  return `<div class="sec-hdr-bar">
  <span class="sec-hd-inline">UPGRADES <span class="sec-hint">— click row to see cost curve</span></span>
  <div class="sec-hdr-right">${resBtns}<span class="fsep">|</span>${stBtns}<span class="fsep">|</span><input class="search" placeholder="filter…" oninput="onLocalSearch(this)" value="${s.localSearch||''}"></div>

function buildModsHTML() {
  const s = ST.mods;
  const sc = col => s.sc===col ? (s.sd>0?' class="sa"':' class="sd"') : '';
  const RES_PREFIXES = ['α','β','γ','δ'];
  let data = Object.keys(MODS).map(k => {
    const m = MODS[k];
    return { key:k, label:m.label||k, type:m.type||'stat',
      es: m.stat||m.effect||'', res:m.res||(RES_PREFIXES.includes(k[0])?k[0]:''),
      minQ:m.minQ||1, minEnemy:m.minEnemy||0,
      base:m.base, perLvl:m.perLvl };
  });
  if (s.ft) data = data.filter(r=>r.type===s.ft);
  if (s.fr) data = data.filter(r=>r.res===s.fr);
  if (s.fq) data = data.filter(r=>r.minQ >= parseInt(s.fq));
  if (s.fe) data = data.filter(r=>r.minEnemy >= parseInt(s.fe));
  const ls = (s.localSearch||'').toLowerCase();
  if (ls) data = data.filter(r=>
    r.key.toLowerCase().includes(ls)||r.label.toLowerCase().includes(ls)||r.es.toLowerCase().includes(ls));
  data.sort((a,b)=>{
    if(s.sc===null) return 0;
    let av=a[s.sc],bv=b[s.sc];
    if(av===''||av===undefined) av=-Infinity;
    if(bv===''||bv===undefined) bv=-Infinity;
    if(s.sc==='minEnemy'){ if(av===0) av=Infinity; if(bv===0) bv=Infinity; }
    if(typeof av==='string') return av.localeCompare(bv)*s.sd;
    return (av-bv)*s.sd;
  });

  const rows = data.map(r => {
    const typeTag = r.type==='stat'?'<span class="tag-s">STAT</span>':'<span class="tag-p">PROC</span>';
    const resCol  = RES_COL[r.res];
    const resTxt  = r.res?`<span style="color:${resCol}">${r.res}</span>`:'<span class="dim">—</span>';
    const minQTxt = `<span style="color:${QCOL[r.minQ-1]}">${QNAME[r.minQ-1]}</span>`;
    const minETxt = r.minEnemy>0?`<span style="color:${ECOL[r.minEnemy]}">E${r.minEnemy}+</span>`:'<span class="dim">any</span>';
    const sel = (selTab==='mods'&&selKey===r.key)?' sel':'';
    const dim = gSearch && !(r.key.toLowerCase().includes(gSearch)||r.label.toLowerCase().includes(gSearch)||r.es.toLowerCase().includes(gSearch)) ? ' sdim' : '';
    const cmpSel = (cmpTab==='mods'&&cmpKey===r.key)?' cmp-sel':'';
    return `<tr class="${sel}${dim}${cmpSel}" onclick="selMod('${r.key}')" data-cmpkey="${r.key}" data-cmptab="mods">
      <td style="color:#ccc">${r.label}</td>
      <td>${typeTag}</td>
      <td>${resTxt}</td>
      <td>${minQTxt}</td>
      <td>${minETxt}</td>
      <td style="color:#aaa">${r.base}</td>
      <td style="color:#777">${r.perLvl}</td>
    </tr>`;
  }).join('');

  const typeBtns=[['','ALL','#777','#2a2a2a'],['stat','STAT','#60a5fa','#60a5fa44'],['proc','PROC','#f59e0b','#f59e0b44']].map(([v,t,c,b])=>{
    const ac=s.ft===v?' active':'';
    return `<button class="fbtn${ac}" style="color:${c};border-color:${b};--ac:${c}" onclick="setMF('ft','${v}')">${t}</button>`;
  }).join('');
  const resBtns2=[''  ,'α','β','γ','δ'].map(r=>{
    const ac=s.fr===r?' active':''; const col=r?RES_COL[r]:'#888'; const bc=r?col+'44':'#383838';
    return `<button class="fbtn${ac}" style="color:${col};border-color:${bc};--ac:${col}" onclick="setMF('fr','${r}')">${r||'ALL'}</button>`;
  }).join('');
  const qBtns=['','1','2','3','4','5'].map((v,i)=>{
    const ac=s.fq===v?' active':''; const col=v?QCOL[parseInt(v)-1]:'#888'; const bc=v?col+'44':'#383838';
    const lbl=v?('≥'+QNAME[parseInt(v)-1]):'ALL Q';
    return `<button class="fbtn${ac}" style="color:${col};border-color:${bc};--ac:${col}" onclick="setMF('fq','${v}')">${lbl}</button>`;
  }).join('');
  const eBtns=['','1','2','3','4'].map((v,i)=>{
    const ac=s.fe===v?' active':''; const col=v?ECOL[parseInt(v)]:'#888'; const bc=v?col+'44':'#383838';
    const lbl=v?'E'+v+'+':'ALL E';
    return `<button class="fbtn${ac}" style="color:${col};border-color:${bc};--ac:${col}" onclick="setMF('fe','${v}')">${lbl}</button>`;
  }).join('');

  return `<div class="sec-hdr-bar">
  <span class="sec-hd-inline">MODS <span class="sec-hint">— item modifications · click row for value preview</span></span>
  <div class="sec-hdr-right">${typeBtns}<span class="fsep">|</span>${resBtns2}<span class="fsep">|</span>${qBtns}<span class="fsep">|</span>${eBtns}<span class="fsep">|</span><input class="search" placeholder="filter…" oninput="onLocalSearch(this)" value="${s.localSearch||''}"></div>
</div>
<div class="tbl-wrap">
<table class="wtbl" id="mod-tbl">
<thead><tr>
  <th onclick="sortM('label')"${sc('label')}>LABEL</th>
  <th onclick="sortM('type')"${sc('type')}>TYPE</th>
  <th onclick="sortM('res')"${sc('res')}>RES</th>
  <th onclick="sortM('minQ')"${sc('minQ')} title="minimum item quality">MIN Q</th>
  <th onclick="sortM('minEnemy')"${sc('minEnemy')} title="minimum enemy tier">MIN E</th>
  <th onclick="sortM('base')"${sc('base')} title="base value at forge level 0">BASE</th>
  <th onclick="sortM('perLvl')"${sc('perLvl')} title="value increase per forge level">PER LVL</th>
</tr></thead>
<tbody>${rows}</tbody>
</table>
</div>`;
}

function sbUpgrade(body, title) {

  const modes = ['reg','pres', ...(hp?['perm']:[])];

  }).join('');

  const rows = [];
  for (let lv = 0; lv < N; lv++) {

// ── Forge chart component ───────────────────────────────────────────────────────────────────────
// ── Forge cost bar (per quality) ─────────────────────────────────────
function forgeCost(level, q) {
  const base  = [3,4,5,9,15][q-1] || 1;
  const scale = [1.6,1.7,1.8,2.0,2.3][q-1] || 1;
  return Math.max(1, Math.floor(base * Math.pow(scale, level)));
}
function drawForgeCostBar(canvasId, q, lv, fmt) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 372, H = canvas.offsetHeight || 360;
  canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const costs = Array.from({length: lv}, (_, i) => forgeCost(i, q));
  const mx = Math.max(...costs, 1);
  const barColor = (QCOL[q - 1] || '#4ade80') + 'aa';
  ctx.clearRect(0, 0, W, H);
  const pad = {l:36, r:10, t:20, b:22};
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch - (i/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    ctx.fillText(fmt(Math.round(mx*(i/4))), pad.l-4, y+3);
  }
  const bw = cw / (lv + 1);
  for (let i = 0; i < lv; i++) {
    const bh = (costs[i]/mx)*ch;
    const x = pad.l + i*bw + bw*0.15;
    const y = pad.t + ch - bh;
    ctx.fillStyle = barColor;
    ctx.fillRect(x, y, bw*0.7, bh);
    if (lv <= 10 && bh >= 12) {
      const fs = Math.max(6, Math.min(9, Math.floor(bw*0.5)));
      ctx.fillStyle = '#aaa'; ctx.font = `${fs}px monospace`; ctx.textAlign = 'center';
      ctx.fillText(fmt(costs[i]), x+bw*0.35, Math.max(pad.t+fs, y-2));
    }
  }
  ctx.fillStyle = '#555'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  const step = Math.ceil(lv/8);
  for (let lbl = 0; lbl < lv; lbl += step) ctx.fillText(lbl, pad.l + lbl*bw + bw/2, H-4);
  ctx.fillStyle = '#777'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText(`${QNAME[q-1]} forge cost  (q=${q})`, W/2, 13);
  const total = costs.reduce((a,b) => a+b, 0);
  ctx.fillStyle = '#444'; ctx.textAlign = 'right';
  ctx.fillText(`Σ=${fmt(total)}`, W-pad.r, H-4);
}

// ── Generic upgrade / cost bar chart ─────────────────────────────────
// costs: pre-computed array; barColor: rgba string; fmt: number formatter
// title: optional string shown at top; label 'no perm' shown if costs is null
function drawCostBars(canvasId, costs, barColor, fmt, title) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 340, H = canvas.offsetHeight || 180;
  canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  if (!costs) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#444'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
    ctx.fillText('no permanent upgrade', W/2, H/2); return;
  }
  const n = costs.length;
  const mx = Math.max(...costs, 1);
  ctx.clearRect(0, 0, W, H);
  const tPad = title ? 20 : 10;
  const pad = {l:36, r:10, t:tPad, b:22};
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch - (i/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(pad.l+cw, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    ctx.fillText(fmt(Math.round(mx*(i/4))), pad.l-4, y+3);
  }
  const bw = cw / (n + 1);
  for (let i = 0; i < n; i++) {
    const bh = (costs[i]/mx)*ch;
    const x = pad.l + i*bw + bw*0.15;
    const y = pad.t + ch - bh;
    ctx.fillStyle = barColor;
    ctx.fillRect(x, y, bw*0.7, bh);
    if (n <= 10 && bh >= 12) {
      const fs = Math.max(6, Math.min(9, Math.floor(bw*0.5)));
      const labelY = y - 2;
      const inside = labelY < pad.t + fs + 2;
      ctx.fillStyle = inside ? '#111' : '#aaa';
      ctx.font = `${fs}px monospace`; ctx.textAlign = 'center';
      ctx.fillText(fmt(costs[i]), x+bw*0.35, inside ? pad.t + fs + 2 : labelY);
    }
  }
  ctx.fillStyle = '#555'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  const step = Math.ceil(n/5);
  for (let lbl = 0; lbl < n; lbl += step) ctx.fillText(lbl, pad.l + lbl*bw + bw/2, H - 4);
  if (title) {
    ctx.fillStyle = '#888'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
    ctx.fillText(title, W/2, 13);
  }
}

// ── Mod growth chart (percentile bands over forge levels) ─────────────
function _pctile(pmf, offset, p) {
  let cum = 0;
  for (let j = 0; j < pmf.length; j++) {
    cum += pmf[j];
    if (cum >= p) return offset + j;
  }
  return offset + pmf.length - 1;
}
function computeGrowthBands(qi, N) {
  const fmc    = FORGE_MULTI_CHANCES[qi];
  const hProbs = fmc.map(p => p / 100);
  let maxK = hProbs.length;
  while (maxK > 1 && hProbs[maxK - 1] < 1e-9) maxK--;
  let pmf = [1.0], offset = 0;
  const bands = [];
  for (let i = 0; i < N; i++) {
    const p05  = _pctile(pmf, offset, 0.05);
    const p25  = _pctile(pmf, offset, 0.25);
    const p50  = _pctile(pmf, offset, 0.50);
    const p75  = _pctile(pmf, offset, 0.75);
    const p95  = _pctile(pmf, offset, 0.95);
    let mean = 0;
    for (let j = 0; j < pmf.length; j++) mean += pmf[j] * (offset + j);
    bands.push({ p05, p25, p50, mean, p75, p95 });
    const newLen = pmf.length + maxK - 1;
    const newPmf = new Float64Array(newLen);
    for (let j = 0; j < pmf.length; j++) {
      if (pmf[j] < 1e-15) continue;
      for (let k = 1; k <= maxK; k++) {
        if (hProbs[k - 1] > 0) newPmf[j + k - 1] += pmf[j] * hProbs[k - 1];
      }
    }
    offset += 1;
    pmf = Array.from(newPmf);
  }
  return bands;
}
// drawModGrowthChart — shared growth chart for mod stat/proc vs forge level
// mod: mod object {type, pct, base, perLvl, ...}
// modKey: string key for MULT_MODS lookup
// chartQ: 1-indexed quality (1-5)
// N: number of forge levels to show
// qrange, splvl, qproc: quality arrays (live or baked)
// toggleStats: {p5,p25,p50,p75,p95} boolean flags
// multMods: Set of mod keys that are multiplicative
function drawModGrowthChart(canvasId, modKey, mod, chartQ, N, qrange, splvl, qproc, toggleStats, multMods) {
  if (!mod) return;
  const isProc = mod.type === 'proc';
  const isMult = multMods instanceof Set ? multMods.has(modKey) : false;
  const isPct  = !!mod.pct;
  const base   = parseFloat(mod.base) || 0;
  const perLvl = parseFloat(mod.perLvl) || 0;

  const bands = Array.from({length:5}, (_, qi) => {
    const cb = computeGrowthBands(qi, N);
    return cb.map(b => {
      if (isProc) {
        const baseC = base + (qproc[qi] || 0);
        const gain  = PLVL_BY_Q[qi];
        return { p05: Math.min(90, baseC + b.p05  * gain),
                 p25: Math.min(90, baseC + b.p25  * gain),
                 p50: Math.min(90, baseC + b.p50  * gain),
                 mean: Math.min(90, baseC + b.mean * gain),
                 p75: Math.min(90, baseC + b.p75  * gain),
                 p95: Math.min(90, baseC + b.p95  * gain) };
      } else {
        const [rMin,rMax] = qrange[qi];
        const bv   = isMult||isPct ? base*(rMin+rMax)/2 : Math.round(base*(rMin+rMax)/2);
        const gain = perLvl * splvl[qi];
        return { p05: +(bv + b.p05  * gain).toFixed(2),
                 p25: +(bv + b.p25  * gain).toFixed(2),
                 p50: +(bv + b.p50  * gain).toFixed(2),
                 mean: +(bv + b.mean * gain).toFixed(2),
                 p75: +(bv + b.p75  * gain).toFixed(2),
                 p95: +(bv + b.p95  * gain).toFixed(2) };
      }
    });
  });

  const sqi   = chartQ - 1;
  const sCol  = QCOL[sqi];
  const sBand = bands[sqi];

  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 372, H = canvas.offsetHeight || 360;
  canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.clearRect(0, 0, W, H);

  const pad = {l:38,r:38,t:16,b:22};
  const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;

  const allV = bands.flatMap(qb => qb.map(pt => pt.mean))
    .concat(sBand.flatMap(pt => [pt.p05, pt.p25, pt.p50, pt.p75, pt.p95]));
  const mn = Math.min(...allV), mxV = Math.max(...allV);
  const span = Math.max(mxV - mn, 0.01);

  const xOf = i => pad.l + (N > 1 ? (i/(N-1))*cw : cw/2);
  const yOf = v => pad.t + ch - ((v-mn)/span)*ch;

  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
  for (let g = 0; g <= 4; g++) {
    const y = pad.t + ch - (g/4)*ch;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
    const lv  = mn + span*(g/4);
    const lbl = isProc||isPct ? lv.toFixed(1)+'%' : isMult ? lv.toFixed(2) : Math.round(lv).toString();
    ctx.fillStyle='#555'; ctx.font='10px monospace'; ctx.textAlign='right';
    ctx.fillText(lbl, pad.l-4, y+3);
  }

  if (toggleStats.p5 && toggleStats.p95) {
    ctx.beginPath();
    sBand.forEach((pt,i) => i===0 ? ctx.moveTo(xOf(i),yOf(pt.p95)) : ctx.lineTo(xOf(i),yOf(pt.p95)));
    for (let i = N-1; i >= 0; i--) ctx.lineTo(xOf(i), yOf(sBand[i].p05));
    ctx.closePath();
    ctx.fillStyle = sCol + '15';
    ctx.fill();
  }

  const ptiles = [
    { p: 'p5',  col: '#f87171', dash: [3,3] },
    { p: 'p25', col: '#fb923c', dash: [2,2] },
    { p: 'p50', col: '#facc15', dash: [] },
    { p: 'p75', col: '#4ade80', dash: [2,2] },
    { p: 'p95', col: '#60a5fa', dash: [3,3] }
  ];
  for (const {p, col, dash} of ptiles) {
    if (!toggleStats[p]) continue;
    ctx.setLineDash(dash); ctx.lineWidth = p==='p50' ? 1.5 : 1; ctx.strokeStyle = col + (p==='p50'?'cc':'88');
    ctx.beginPath();
    sBand.forEach((pt,i) => {
      const v = pt[p];
      i===0 ? ctx.moveTo(xOf(i),yOf(v)) : ctx.lineTo(xOf(i),yOf(v));
    });
    ctx.stroke();
  }
  ctx.setLineDash([]);

  for (let qi = 0; qi < 5; qi++) {
    ctx.strokeStyle = QCOL[qi] + (qi < 2 ? '88' : 'dd');
    ctx.lineWidth   = qi >= 3 ? 2.5 : qi === 2 ? 2 : 1.5;
    ctx.beginPath();
    bands[qi].forEach((pt,i) => i===0 ? ctx.moveTo(xOf(i),yOf(pt.mean)) : ctx.lineTo(xOf(i),yOf(pt.mean)));
    ctx.stroke();
    ctx.fillStyle = QCOL[qi];
    ctx.beginPath(); ctx.arc(xOf(N-1), yOf(bands[qi][N-1].mean), qi>=3?3:2, 0, 2*Math.PI); ctx.fill();
  }

  const last = sBand[N-1];
  ctx.font = '8px monospace'; ctx.textAlign = 'left';
  let yPos = yOf(last.p95);
  if (toggleStats.p95) { ctx.fillStyle = '#60a5fabb'; ctx.fillText('p95', xOf(N-1)+5, yPos-2); yPos -= 10; }
  if (toggleStats.p75) { ctx.fillStyle = '#4ade80aa'; ctx.fillText('p75', xOf(N-1)+5, yPos-2); yPos -= 10; }
  if (toggleStats.p50) { ctx.fillStyle = '#facc15aa'; ctx.fillText('p50', xOf(N-1)+5, yPos-2); yPos -= 10; }
  if (toggleStats.p25) { ctx.fillStyle = '#fb923caa'; ctx.fillText('p25', xOf(N-1)+5, yPos-2); yPos -= 10; }
  if (toggleStats.p5)  { ctx.fillStyle = '#f87171aa'; ctx.fillText('p5',  xOf(N-1)+5, yPos-2); }

  ctx.fillStyle='#555'; ctx.font='9px monospace'; ctx.textAlign='center';
  const step = Math.max(1, Math.ceil(N/8));
  for (let i=0; i<N; i+=step) ctx.fillText(i, xOf(i), H-4);

  const order = [0,1,2,3,4].sort((a,b) => bands[b][N-1].mean-bands[a][N-1].mean);
  ctx.font='bold 9px monospace'; ctx.textAlign='right';
  order.forEach((qi, rank) => {
    ctx.fillStyle = QCOL[qi];
    ctx.fillText(QNAME[qi], pad.l+cw-2, pad.t + rank*11 + 9);
  });

  ctx.fillStyle='#555'; ctx.font='10px monospace'; ctx.textAlign='center';
  ctx.fillText(isProc ? 'proc chance / forge lv' : 'stat value / forge lv', W/2, pad.t-4);
}

function drawLootCharts(e) {
  const maxDrops = e.dcMax || e.lMax || 1;
  const lMin = e.lMin || 1;
  const PAD = {l:30, r:62, t:8, b:18};

  QNAME.forEach((qn, qi) => {
    const canvas = document.getElementById('loot-qc-' + qi);
    if (!canvas) return;
    const wrap = document.getElementById('loot-qw-' + qi);
    const W = (wrap ? wrap.offsetWidth : canvas.offsetWidth) || 310;
    const H = Math.max(wrap ? wrap.offsetHeight : canvas.offsetHeight, 40);
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    const col = QCOL[qi];
    const p   = (e.qW[qi] || 0) / 100;
    const cW  = W - PAD.l - PAD.r;
    const cH  = H - PAD.t - PAD.b;

    [50, 100].forEach(pct => {
      const y = PAD.t + cH * (1 - pct / 100);
      ctx.strokeStyle = '#1d1d1d'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(PAD.l + cW, y); ctx.stroke();
      ctx.fillStyle = '#2a2a2a'; ctx.font = '8px monospace';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(pct + '%', PAD.l - 2, y);
    });

    ctx.fillStyle = p > 0.001 ? col : '#333';
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(QFULL[qi], W - 2, PAD.t + cH / 2);

    const totalW = cW * 0.72;
    const barW   = totalW / maxDrops;
    const startX = PAD.l + (cW - totalW) / 2;

    for (let n = 1; n <= maxDrops; n++) {
      const pAny = p > 0 ? 1 - Math.pow(1 - p, n) : 0;
      const dimmed = n < lMin;
      const alpha  = dimmed ? 0.18 : 0.45 + (n - lMin) / Math.max(1, maxDrops - lMin) * 0.55;
      const bh = pAny * cH;
      const bx = startX + (n - 1) * barW;
      const by = PAD.t + cH - bh;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p > 0 ? col : '#555';
      if (bh > 0) ctx.fillRect(bx, by, barW * 0.82, bh);
      if (pAny > 0 && !dimmed) {
        ctx.globalAlpha = 1; ctx.fillStyle = col;
        ctx.fillRect(bx, by, barW * 0.82, 2);
      }
    }
    ctx.globalAlpha = 1;

    for (let n = 1; n <= maxDrops; n++) {
      const bx = startX + (n - 1) * barW + (barW * 0.82) / 2;
      ctx.fillStyle = n < lMin ? '#252525' : '#333';
      ctx.font = '8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText('×' + n, bx, H - PAD.b + 3);
    }

    if (p > 0.0005) {
      for (let n = 1; n <= maxDrops; n++) {
        const pAny = 1 - Math.pow(1 - p, n);
        const bx   = startX + (n - 1) * barW + (barW * 0.82) / 2;
        const by   = PAD.t + cH * (1 - pAny);
        const pct  = pAny * 100;
        const lbl  = pct < 1 ? pct.toFixed(2)+'%' : pct.toFixed(1)+'%';
        ctx.fillStyle = QCOL[qi]; ctx.font = '8px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText(lbl, bx, Math.max(PAD.t + 9, by));
      }
    } else if (p === 0) {
      ctx.fillStyle = '#2d2d2d'; ctx.font = '9px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('0%', PAD.l + cW / 2, PAD.t + cH / 2);
    }
  });
}

function cmpRenderUpgrade(body, title) {
  const k = cmpKey; const u = UPG[k]; if (!u) return;
  title.textContent = u.label;
  const hp = hasPerm(k);
  const modes = ['reg','pres',...(hp?['perm']:[])];
  const modeBtns = modes.map(m=>{
    const ac = cmpSbMode===m?' active':'';
    return `<button class="lvl-btn${ac}" onclick="setCmpSbMode('${m}')">${{reg:'REG',pres:'PRES',perm:'PERM'}[m]}</button>`;
  }).join('');
  const N = 15; let cumul = 0; const rows = [];
  for (let lv = 0; lv < N; lv++) {
    let cost, costStr, cumulStr;
    if (cmpSbMode==='reg') {
      cost = upgCost(k, lv); const col = RES_COL[u.res]||'#888';
      costStr = `<span style="color:${col}">${fmtN(cost)}</span>`;
      cumul += cost; cumulStr = `<span style="color:${col};opacity:.5">${fmtN(cumul)}</span>`;
    } else if (cmpSbMode==='pres') {
      cost = presCost(k, lv);
      costStr = `<span style="color:#fcd34d">${fmtN(cost)} ꛜ</span>`;
      cumul += cost; cumulStr = `<span style="color:#fcd34d;opacity:.5">${fmtN(cumul)}</span>`;
    } else {
      if (!hp) break; cost = permCostFn(k, lv);
      costStr = `<span style="color:#a78bfa">${fmtN(cost)} ꛜ</span>`;
      cumul += cost; cumulStr = `<span style="color:#a78bfa;opacity:.5">${fmtN(cumul)}</span>`;
    }
    rows.push(`<tr><td class="muted">${lv}</td><td>${costStr}</td><td style="color:#555">${cumulStr}</td></tr>`);
  }
  const resLabel = cmpSbMode==='reg'?(RES_COL[u.res]?u.res:'?'):(cmpSbMode==='pres'?'ꛜ':'perm ꛜ');
  const permStr  = hp?` · perm at <span style="color:#a78bfa">E${PERM_RES_UNLOCK[u.res]}</span>`:'';
  const lvlBtns = [5,10,25,50].map(n => {
    const ac = n===wikiCmpUpgLevels ? ' active' : '';
    const s  = n===wikiCmpUpgLevels ? 'color:#c084fc;border-color:#c084fc44;background:#1a0d2a' : '';
    return `<button onclick="setCmpUpgLevels(${n})" data-levels="${n}" class="level-btn${ac}" style="${s}">${n}</button>`;
  }).join('');
  body.innerHTML = `
    <div class="sb-modes">${modeBtns}</div>
    <div class="sb-info">base: <span style="color:#aaa">${u.base}</span> · scale: <span style="color:#aaa">×${u.scale||DEFAULT_SCALE}</span>${permStr}</div>
    <div class="sb-scroll"><table class="ct">
      <thead><tr><th>LVL</th><th>COST (${resLabel})</th><th>CUMUL.</th></tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table></div>
    <div class="sidebar-section" style="padding:6px 14px 8px">
      <div style="display:flex;gap:4px" id="cmp-upg-lvl-btns">${lvlBtns}</div>
    </div>
    <div style="padding:0 14px 14px;flex-shrink:0">
      <canvas id="cmp-upg-chart" style="width:100%;height:360px;display:block"></canvas>
    </div>`;
  requestAnimationFrame(() => drawCmpUpgChart());
}

function cmpRenderMod(body, title) {
  const k = cmpKey; const m = MODS[k]; if (!m) return;
  title.textContent = m.label;
  const isProc = m.type==='proc', isPct=!!m.pct, isMult=MULT_MODS.has(k);
  const hasNoMult = isProc && m.effect && !['dmgMulti','armMulti'].includes(m.effect);
  const header = '<th class="muted">LVL</th>'+QNAME.map((q,qi)=>`<th style="color:${QCOL[qi]}">${q}</th>`).join('');
  const rows = [];
  for (let lv = 0; lv <= 9; lv++) {
    const cells = QNAME.map((_,qi) => {
      const minQ = m.minQ||1;
      if (qi+1 < minQ) return `<td class="dim">—</td>`;
      if (isProc) {
        const baseChance = m.base + QPROC[qi];
        const chance = Math.min(95, Math.round(baseChance + lv*(PLVL_BY_Q[qi]||0.5)));
        if (hasNoMult) return `<td style="color:${QCOL[qi]};font-size:11px">${chance}%</td>`;
        const pmr = PROC_MULT_RANGE[qi];
        if (!pmr||!pmr.length) return `<td class="dim">—</td>`;
        const mid = ((pmr[0]+pmr[1])/2 + lv*MULT_PLVL_BY_Q[qi]).toFixed(1);
        return `<td style="font-size:10px;color:${QCOL[qi]}">${chance}% <span class="dim">×${mid}</span></td>`;
      } else {
        const val = m.base + lv*m.perLvl*STAT_PLVL_MULT[qi];
        let fs;
        if (isPct)       fs = val.toFixed(1)+'%';
        else if (isMult) fs = val.toFixed(3);
        else if (val<1)  fs = val.toFixed(3);
        else if (val<10) fs = val.toFixed(2);
        else             fs = val.toFixed(1);
        return `<td style="color:${QCOL[qi]};font-size:11px">${fs}</td>`;
      }
    }).join('');
    rows.push(`<tr class="${lv%2?'':'ev'}"><td class="muted">${lv}</td>${cells}</tr>`);
  }
  const typeTag = isProc?'<span class="tag-p">PROC</span>':'<span class="tag-s">STAT</span>';
  const resStr  = m.res?`<span style="color:${RES_COL[m.res]}">${m.res}</span>`:'';
  const minQStr = m.minQ?`<span style="color:${QCOL[m.minQ-1]}">${QNAME[m.minQ-1]}+</span>`:'any Q';
  const vmF = wikiCmpChartViewMode==='forge', vmV = wikiCmpChartViewMode==='value';
  const ts = wikiCmpToggleStats;
  const qBtnHtml = [[1,'C','#9ca3af'],[2,'U','#4ade80'],[3,'R','#60a5fa'],[4,'E','#c084fc'],[5,'L','#f59e0b']].map(([q,nm,col]) => {
    const active = q === wikiCmpChartQ;
    const bg = active ? [,'','','#0d1a2a','#100818','#1a1200'][q] : '';
    return `<button onclick="setCmpChartQ(${q})" data-cq="${q}" class="level-btn${active?' active':''}" style="color:${col};border-color:${col}44;background:${bg}">${nm}</button>`;
  }).join('');
  body.innerHTML = `
    <div class="sb-info" style="line-height:1.8">
      ${typeTag} ${resStr} <span class="muted">${m.stat||m.effect||''}</span><br>
      base: <span style="color:#aaa">${m.base}${isPct?'%':''}</span>
      · per lv: <span style="color:#aaa">${m.perLvl}${isPct?'%':''}</span>
      · min Q: ${minQStr}
      · avail: <span class="muted">${m.minEnemy?'E'+m.minEnemy+'+':'E0+'}</span>
    </div>
    <div style="padding:3px 14px 2px;font-size:9px;letter-spacing:1px;color:#555">VALUE AT FORGE LEVEL × QUALITY</div>
    <div class="sb-scroll"><table class="mvt">
      <thead><tr>${header}</tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table></div>
    <div class="sidebar-section">
      <div style="display:flex;gap:5px;margin-bottom:8px">
        <button onclick="setCmpChartViewMode('forge')" data-cwvm="forge"
          class="level-btn${vmF?' active':''}"
          ${vmF?'style="color:#4ade80;border-color:#4ade8044;background:#0a1f0a"':''}>COST</button>
        <button onclick="setCmpChartViewMode('value')" data-cwvm="value"
          class="level-btn${vmV?' active':''}"
          ${vmV?'style="color:#4ade80;border-color:#4ade8044;background:#0a1f0a"':''}>GROWTH</button>
      </div>
      <div style="display:flex;gap:5px;margin-bottom:6px" id="cmp-q-btns">${qBtnHtml}</div>
      <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">
        <button onclick="setCmpStatToggle('p5')" data-cwstat="p5"
          class="level-btn${ts.p5?' active':''}"
          style="color:#f87171;border-color:#f871714d;${ts.p5?'background:#2a1a1a;':''}font-size:10px;padding:2px 6px">P5</button>
        <button onclick="setCmpStatToggle('p25')" data-cwstat="p25"
          class="level-btn${ts.p25?' active':''}"
          style="color:#fb923c;border-color:#fb923c4d;${ts.p25?'background:#1a1000;':''}font-size:10px;padding:2px 6px">P25</button>
        <button onclick="setCmpStatToggle('p50')" data-cwstat="p50"
          class="level-btn${ts.p50?' active':''}"
          style="color:#facc15;border-color:#facc154d;${ts.p50?'background:#2a2a1a;':''}font-size:10px;padding:2px 6px">P50</button>
        <button onclick="setCmpStatToggle('p75')" data-cwstat="p75"
          class="level-btn${ts.p75?' active':''}"
          style="color:#4ade80;border-color:#4ade8044;${ts.p75?'background:#0a1f0a;':''}font-size:10px;padding:2px 6px">P75</button>
        <button onclick="setCmpStatToggle('p95')" data-cwstat="p95"
          class="level-btn${ts.p95?' active':''}"
          style="color:#60a5fa;border-color:#60a5fa44;${ts.p95?'background:#1a2a3a;':''}font-size:10px;padding:2px 6px">P95</button>
      </div>
    </div>
    <div id="cmp-chart-inner" style="display:none">
      <canvas id="cmp-forge-chart" style="width:100%;height:360px;display:block"></canvas>
    </div>
    <div id="cmp-chart-inner-v" style="display:none">
      <canvas id="cmp-value-chart" style="width:100%;height:360px;display:block"></canvas>
    </div>`;
  requestAnimationFrame(() => cmpRefreshCharts(k));
}

function cmpRenderEnemy(body, title) {
  const savedKey = selKey, savedTab = selTab;
  selKey = cmpKey; selTab = 'enemies';
  sbEnemy(body, title);
  selKey = savedKey; selTab = savedTab;
}

function cmpRenderLoot(body, title) {
  const id = cmpKey; const e = ENEMIES.find(x=>x.id===id); if (!e) return;
  title.textContent = `E${id} — drop odds`;
  const qBars = e.qW.map((w,i)=>`
    <div class="e-bar-row">
      <div style="display:flex;justify-content:space-between">
        <span style="color:${QCOL[i]};font-size:12px">${QFULL[i]}</span>
        <span style="color:#aaa;font-size:12px">${w}%</span>
      </div>
      <div class="e-bar-track"><div class="e-bar-fill" style="width:${Math.min(100,w)}%;background:${QCOL[i]}"></div></div>
    </div>`).join('');
  body.innerHTML = `
    <div style="padding:12px 14px;flex:1;overflow-y:auto">
      <div style="font-size:9px;letter-spacing:1px;color:#555;margin-bottom:8px">QUALITY DROP ODDS</div>
      <div style="margin-bottom:10px;color:#777;font-size:12px">drop lvls: ${e.lMin}–${e.lMax}${e.dcMax?' · dc max: '+e.dcMax:''} · reward: ${e.pp?fmtN(e.pp)+' ꛜ':'—'}</div>
      ${qBars}
    </div>`;
}

// ─── INIT ───────────────────────────────────────────────────────────────────────────────────────

let mobView = 'table';
function setMobView(v) {
  mobView = v;
  const isMob = window.innerWidth < 768;
  const main  = document.getElementById('main-content');
  const sb    = document.getElementById('sidebar');
  const sbCmp = document.getElementById('sidebar-cmp');
  if (isMob) {
    main.style.display  = v === 'table'   ? '' : 'none';
    sb.style.display    = v === 'detail'  ? 'flex' : 'none';
    sbCmp.style.display = (v === 'compare' && cmpKey !== null) ? 'flex' : 'none';
  } else {
    main.style.display  = '';
    sb.style.display    = '';
    sbCmp.style.display = cmpKey !== null ? 'flex' : 'none';
    document.getElementById('layout').classList.toggle('has-cmp', cmpKey !== null);
  }
  document.querySelectorAll('.mob-tab').forEach(b => b.classList.remove('active'));
  const bt = document.getElementById('mobt-' + v);
  if (bt) bt.classList.add('active');
}
window.addEventListener('resize', () => setMobView(mobView));

applyHash();
renderMain();
renderSB();

// ─── CONTEXT MENU & LONG PRESS ─────────────────────────────────────────────────────
(function() {
  const mc = document.getElementById('main-content');
  mc.addEventListener('contextmenu', function(ev) {
    const tr = ev.target.closest('tr[data-cmpkey]');
    if (!tr) return;
    ev.preventDefault();
    const raw = tr.dataset.cmpkey;
    const tab = tr.dataset.cmptab;
    const newKey = (tab === 'enemies' || tab === 'loot') ? Number(raw) : raw;
    if (cmpKey === newKey && cmpTab === tab) { closeCmp(); return; }
    cmpKey = newKey; cmpTab = tab; cmpSbMode = 'reg';
    renderMain(); renderCmp();
    if (window.innerWidth < 768) setMobView('compare');
  });
  let _lpTimer = null, _lpFired = false;
  mc.addEventListener('touchstart', function(ev) {
    const tr = ev.target.closest('tr[data-cmpkey]');
    if (!tr) return;
    _lpFired = false;
    _lpTimer = setTimeout(function() {
      _lpTimer = null; _lpFired = true;
      const raw = tr.dataset.cmpkey, tab = tr.dataset.cmptab;
      const newKey = (tab === 'enemies' || tab === 'loot') ? Number(raw) : raw;
      if (cmpKey === newKey && cmpTab === tab) { closeCmp(); return; }
      cmpKey = newKey; cmpTab = tab; cmpSbMode = 'reg';
      renderMain(); renderCmp();
      setMobView('compare');
    }, 520);
  }, {passive: true});
  function cancelLp() { if (_lpTimer !== null) { clearTimeout(_lpTimer); _lpTimer = null; } }
  mc.addEventListener('touchend', function(ev) {
    if (_lpFired) { ev.preventDefault(); _lpFired = false; }
    cancelLp();
  }, {passive: false});
  mc.addEventListener('touchmove', cancelLp, {passive: true});
})();

if (selKey !== null && window.innerWidth < 768) setMobView('detail');
else setMobView('table');
</script>
</body>
